    :root {

      --spec-canonical:    #1e1b4b;   /* indigo-950 */
      --spec-direct:       #134e4a;   /* teal-900 */
      --spec-partial:      #92400e;   /* amber-800 */
      --spec-transformed:  #9f1239;   /* rose-800 */
      --spec-unverifiable: #57534e;   /* stone-600 */

      /* Editorial paper palette */
      --paper:        #f6f3ec;        /* warm cream */
      --paper-2:      #ede8db;        /* deeper cream */
      --paper-3:      #e3dccb;
      --paper-4:      #d6cfbb;
      --ink:          #18181b;        /* charcoal */
      --ink-soft:     #3f3f46;
      --ink-mid:      #71717a;
      --ink-faint:    #a8a29e;
      --rule:         #c8c2af;
      --rule-soft:    #dcd6c4;
      --rule-strong:  #8d8674;

      /* Multi-layer paper depth — editorial 3D shadow stack */

        0 1px 0 rgba(24,24,27,0.05),
        0 2px 4px -2px rgba(24,24,27,0.06),
        0 12px 28px -14px rgba(24,24,27,0.16),
        0 28px 56px -28px rgba(24,24,27,0.20),
        0 56px 96px -48px rgba(24,24,27,0.18);
      --card-shadow-active:
        0 1px 0 rgba(24,24,27,0.08),
        0 3px 6px -2px rgba(24,24,27,0.10),
        0 18px 36px -16px rgba(24,24,27,0.22),
        0 40px 72px -32px rgba(24,24,27,0.28),

    }

    #root { position: relative; z-index: 1; }

    .serif {
      font-family: 'Source Serif 4', 'Pretendard', 'Apple SD Gothic Neo', serif;
      font-optical-sizing: auto;
    }
    .mono {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-feature-settings: 'tnum';
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* Editorial micro-typography */
    .cap {

      letter-spacing: 0.18em;
      text-transform: uppercase;

    .ink-unverifiable { color: var(--spec-unverifiable); }
    .bg-canonical     { background: var(--spec-canonical); }
    .bg-direct        { background: var(--spec-direct); }
    .bg-partial       { background: var(--spec-partial); }
    .bg-transformed   { background: var(--spec-transformed); }
    .bg-unverifiable  { background: var(--spec-unverifiable); }

    .border-partial   { border-color: var(--spec-partial); }
    .border-transformed { border-color: var(--spec-transformed); }
    .border-unverifiable { border-color: var(--spec-unverifiable); }

    @keyframes shimmer {

      50%      { opacity: 1; }

    .editorial-card {

      border: 1px solid var(--rule);
      border-radius: 2px;
      box-shadow: var(--card-shadow);
      position: relative;

      background-image:

        linear-gradient(90deg, rgba(24,24,27,0.018) 0%, transparent 4%, transparent 96%, rgba(24,24,27,0.018) 100%),
        linear-gradient(white, white);
    }
    /* Spectrum gradient top edge bar */
    .editorial-card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 3px;
      background: linear-gradient(90deg,
        var(--spec-canonical) 0%,
        var(--spec-direct) 25%,
        var(--spec-partial) 50%,
        var(--spec-transformed) 75%,
        var(--spec-unverifiable) 100%);

      border-radius: 2px 2px 0 0;

    /* Bottom edge — subtle depth */

      content: '';

      bottom: -1px; left: 6%; right: 6%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(24,24,27,0.18), transparent);

      pointer-events: none;

    /* Deck transitions */

    /* Headline rhythm */

      opacity: 0;

      bottom: -3px; left: 0; right: 0;

      font-size: 10.5px;

      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.005em;
      line-height: 1.5;
      color: var(--ink-soft);

    .pull-quote::before {
      content: '\201C';
      font-family: 'Source Serif 4', serif;
      font-size: 2.2em;
      line-height: 0;
      vertical-align: -0.34em;
      color: var(--spec-canonical);

      display: flex; align-items: center; gap: 10px;

      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      font-weight: 500;
    }
    .section-label::after {
      content: ''; flex: 1;
      border-top: 1px solid var(--rule);

    /* Mark — small caps inline label */

      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid currentColor;
      border-radius: 1px;
      line-height: 1;

    /* Stats display */

      border-left: 1px solid var(--rule);
      padding-left: 14px;

      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;

    .snap-scroller::-webkit-scrollbar { display: none; }

    .mini-card {

        0 10px 24px -12px rgba(24,24,27,0.14);
    }

    @media (max-width: 380px) {
      .card-pad { padding: 20px !important; }
    }
  </style>

// Spectrum mark — refined SVG with refraction
function SpectrumMark({ size = 28, strokeWidth = 1.4, animated = false }) {
  const colors = [
    "var(--spec-canonical)",
    "var(--spec-direct)",
    "var(--spec-partial)",
    "var(--spec-transformed)",
    "var(--spec-unverifiable)",
  ];
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={{ display: "block" }}>
      {/* Incident light beam */}
      <line x1="2" y1="13" x2="11" y2="13" stroke="var(--ink)" strokeWidth={strokeWidth * 0.65} opacity="0.35" />
      {/* Prism */}
      <polygon
        points="16,4 28,26 4,26"
        fill="none"
        stroke="var(--ink)"
        strokeWidth={strokeWidth}
      />
      {/* Dispersion rays */}
      {colors.map((c, i) => {
        const offset = (i - 2) * 1.6;
        return (
          <line
            key={i}
            x1={16 + offset * 0.4}
            y1={16}
            x2={28 + offset * 1.0}
            y2={20 + i * 0.4}
            stroke={c}
            strokeWidth={strokeWidth * 1.05}
            opacity="0.92"
            className={animated ? "shimmer" : ""}
            style={{ animationDelay: `${i * 0.2}s` }}
          />
        );
      })}
    </svg>
  );
}

function Logo({ size = "md" }) {
  const wordSize = size === "sm" ? "text-[14px]" : size === "lg" ? "text-[19px]" : "text-[16px]";

}

function formatNumber(n) {
  if (n == null) return "—";
  if (n === 0) return "0";
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, "") + "만";
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return n.toLocaleString();
}

function formatNumberCompact(n) {
  if (n == null) return "—";
  if (n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1).replace(/\.0$/, "") + "만";
  if (n >= 1000) return (n / 1000).toFixed(0) + "K";
  return n.toString();
}

// ============================================================
// DIFFUSION CURVE — refined with axis ticks + peak annotation
// ============================================================

function DiffusionCurve({ data, peak }) {
  const W = 320, H = 150;
  const pad = { top: 18, right: 16, bottom: 28, left: 42 };
  const iw = W - pad.left - pad.right;
  const ih = H - pad.top - pad.bottom;
  const maxRaw = Math.max(...data.map(d => d.cumulative));
  const niceMax = (() => {
    if (maxRaw < 50000) return Math.ceil(maxRaw / 10000) * 10000;
    if (maxRaw < 200000) return Math.ceil(maxRaw / 50000) * 50000;
    return Math.ceil(maxRaw / 100000) * 100000;
  })();
  const points = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1)) * iw,
    y: pad.top + ih - (d.cumulative / niceMax) * ih,
    hour: d.hour,
    val: d.cumulative,
  }));
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  const areaPath = `${path} L ${points[points.length - 1].x} ${pad.top + ih} L ${points[0].x} ${pad.top + ih} Z`;
  const yTicks = [0, 0.5, 1];
  const formatHour = (h) => h < 24 ? `${h}h` : `${Math.round(h / 24)}d`;
  const peakIdx = peak ? data.findIndex(d => d.hour === peak.hour) : -1;
  return (
    <div>
      <div className="section-label mb-3">FIG.B — 확산 곡선</div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: 200 }}>
        <defs>
          <linearGradient id="diffusionGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stopColor="var(--spec-canonical)" stopOpacity="0.22" />
            <stop offset="100%" stopColor="var(--spec-canonical)" stopOpacity="0.01" />
          </linearGradient>
        </defs>
        {/* Y-axis grid */}
        {yTicks.map((frac, i) => {
          const y = pad.top + ih - frac * ih;
          const v = frac * niceMax;
          return (
            <g key={i}>
              <line x1={pad.left} y1={y} x2={pad.left + iw} y2={y} stroke="var(--rule)" strokeDasharray="2 4" opacity={frac === 0 ? 1 : 0.6} />
              <text x={pad.left - 6} y={y + 3} textAnchor="end" fontSize="8.5" fill="var(--ink-faint)" className="mono">{formatNumberCompact(v)}</text>
            </g>
          );
        })}
        {/* X axis baseline */}
        <line x1={pad.left} y1={pad.top + ih} x2={pad.left + iw} y2={pad.top + ih} stroke="var(--rule)" strokeWidth="0.8" />

        {/* Area */}
        <path d={areaPath} fill="url(#diffusionGrad)" />
        {/* Line */}
        <path d={path} fill="none" stroke="var(--spec-canonical)" strokeWidth="1.6" />
        {/* Peak annotation marker */}
        {peakIdx >= 0 && (
          <g>
            <circle cx={points[peakIdx].x} cy={points[peakIdx].y} r="6" fill="none" stroke="var(--spec-transformed)" strokeWidth="1.2" />
            <line
              x1={points[peakIdx].x}
              y1={points[peakIdx].y - 8}
              x2={points[peakIdx].x}
              y2={pad.top - 4}
              stroke="var(--spec-transformed)"
              strokeWidth="0.8"
              strokeDasharray="2 2"
            />
            <text x={points[peakIdx].x} y={pad.top - 6} textAnchor="middle" fontSize="8" fill="var(--spec-transformed)" className="mono" letterSpacing="0.1em">PEAK</text>
          </g>
        )}
        {/* Data points */}
        {points.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="2.5" fill="white" stroke="var(--spec-canonical)" strokeWidth="1.4" />
            <text x={p.x} y={H - 8} textAnchor="middle" fontSize="8.5" fill="var(--ink-mid)" className="mono">{formatHour(p.hour)}</text>
          </g>
        ))}
      </svg>
      {peak && (
        <div className="text-[11px] text-[color:var(--ink-soft)] leading-relaxed mt-2 italic serif">
          {peak.label}
        </div>
      )}
    </div>
  );
}

// ============================================================
// HORIZONTAL SNAP — native scroll-snap carousel for inner-inner cards
// Used inside Spread panels (FLOW / REACT / TRACE) so each step or
// comment becomes its own full-width mini-card with horizontal swipe.
// ============================================================

function HorizontalSnap({ items, render }) {
  const [active, setActive] = useState(0);
  const ref = useRef(null);
  // Card width per item — keeps a slim peek of the next card visible
  // so the user can SEE there's more content sideways.
  const ITEM_WIDTH_PCT = 78;
  const STEP_PX_RATIO  = ITEM_WIDTH_PCT / 100;

  const go = (dir) => {
    const el = ref.current;
    if (!el) return;
    el.scrollBy({ left: dir * el.clientWidth * STEP_PX_RATIO, behavior: "smooth" });
  };

  const onScroll = () => {
    const el = ref.current;
    if (!el) return;
    const step = el.clientWidth * STEP_PX_RATIO;
    const idx = Math.round(el.scrollLeft / step);
    setActive(Math.max(0, Math.min(items.length - 1, idx)));
  };

  return (
    <div>
      <div
        ref={ref}
        onScroll={onScroll}
        className="snap-scroller flex overflow-x-auto items-stretch -mx-1"
        onTouchStart={(e) => e.stopPropagation()}
        onTouchMove={(e) => e.stopPropagation()}
        onTouchEnd={(e) => e.stopPropagation()}
        style={{ scrollPaddingLeft: 4, scrollPaddingRight: 4 }}
      >
        {items.map((it, i) => (
          <div
            key={i}
            className="snap-item shrink-0 px-1"
            style={{
              width: `${ITEM_WIDTH_PCT}%`,
              scrollSnapAlign: "start",
            }}
          >
            {render(it, i, items.length)}
          </div>
        ))}
      </div>

      {/* Arrows + indicator + position */}
      <div className="flex items-center justify-between mt-4 px-1">
        <button
          onClick={() => go(-1)}
          disabled={active === 0}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-white flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="이전"
        >
          <span className="serif text-[14px] leading-none">←</span>
        </button>
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-1">
            {items.map((_, i) => (
              <span
                key={i}
                className="transition-all"
                style={{
                  width: i === active ? 18 : 4,
                  height: 4,
                  background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                  opacity: i === active ? 1 : 0.4,
                }}
              />
            ))}
          </div>
          <span className="mono text-[10px] uppercase tracking-[0.18em] tabular-nums text-[color:var(--ink-mid)]">
            <span className="text-[color:var(--ink)] font-semibold">{String(active + 1).padStart(2, "0")}</span>
            <span className="text-[color:var(--ink-faint)] mx-1">/</span>
            <span>{String(items.length).padStart(2, "0")}</span>
          </span>
        </div>
        <button
          onClick={() => go(1)}
          disabled={active === items.length - 1}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-white flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="다음"
        >
          <span className="serif text-[14px] leading-none">→</span>
        </button>
      </div>
    </div>
  );
}

// ============================================================
// CARD SPREAD — sub-carousel within a card (5 figures)
// All figures equal-status, navigate left/right within one box
// ============================================================

function CardSpread({ card }) {
  const [active, setActive] = useState(0);
  const [drag, setDrag] = useState({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  const [vh, setVh] = useState(0);
  const panelRefs = useRef({});

  const panels = useMemo(() => {
    const arr = [
      {
        id: "flow", label: "흐름", en: "FLOW",
        count: card.trail.length, unit: "STEPS",
        node: (
          <HorizontalSnap
            items={card.trail}
            render={(s, i, t) => <FlowMiniCard step={s} index={i} total={t} />}
          />
        )
      },
    ];
    if (card.diffusion && card.diffusion.length > 0) {
      arr.push({
        id: "spread", label: "확산", en: "SPREAD",
        count: null, unit: "CURVE",
        node: <DiffusionCurve data={card.diffusion} peak={card.diffusionPeak} />,
      });
    }
    arr.push({
      id: "trace", label: "출처", en: "TRACE",
      count: card.trail.length, unit: "LEVELS",
      node: (
        <HorizontalSnap
          items={card.trail}
          render={(s, i, t) => <TraceMiniCard step={s} index={i} total={t} />}
        />
      )
    });
    if (card.reception && card.reception.length > 0) {
      arr.push({
        id: "react", label: "반응", en: "REACT",
        count: card.reception.length, unit: "QUOTES",
        node: (
          <HorizontalSnap
            items={card.reception}
            render={(r, i, t) => <ReactMiniCard r={r} index={i} total={t} />}
          />
        )
      });
    }
    if (card.kg) arr.push({
      id: "graph", label: "관계", en: "GRAPH",
      count: card.kg.nodes.length, unit: "NODES",
      node: <MiniKG kg={card.kg} />,
    });
    return arr.map((p, i) => ({ ...p, num: String(i + 1).padStart(2, "0") }));
  }, [card]);

  // Active panel height tracking
  useEffect(() => {
    const measure = () => {
      const el = panelRefs.current[active];
      if (el) setVh(el.offsetHeight);
    };
    measure();
    let ro;
    if (typeof ResizeObserver !== "undefined") {
      ro = new ResizeObserver(measure);
      Object.values(panelRefs.current).forEach((el) => el && ro.observe(el));
    }
    window.addEventListener("resize", measure);
    const t = setTimeout(measure, 80);
    return () => {
      window.removeEventListener("resize", measure);
      if (ro) ro.disconnect();
      clearTimeout(t);
    };
  }, [active]);

  const go = (dir) => setActive((a) => Math.max(0, Math.min(panels.length - 1, a + dir)));

  // Inner touch handlers — stopPropagation so outer card deck doesn't also receive them
  const onTouchStart = (e) => {
    e.stopPropagation();
    const t = e.touches[0];
    setDrag({ active: true, startX: t.clientX, startY: t.clientY, dx: 0, dy: 0, locked: null });
  };
  const onTouchMove = (e) => {
    if (!drag.active) return;
    e.stopPropagation();
    const t = e.touches[0];
    const dx = t.clientX - drag.startX;
    const dy = t.clientY - drag.startY;
    let locked = drag.locked;
    if (!locked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
    }
    setDrag((d) => ({ ...d, dx, dy, locked }));
  };
  const onTouchEnd = (e) => {
    if (!drag.active) return;
    e.stopPropagation();
    if (drag.locked === "x") {
      const threshold = 50;
      if (drag.dx > threshold) go(-1);
      else if (drag.dx < -threshold) go(1);
    }
    setDrag({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  };
  const dragOffset = drag.locked === "x" ? drag.dx : 0;

  return (
    <div className="my-6">
      {/* Spread tabs — each tab shows the spread's content count
          (e.g. FLOW · 07 STEPS) so the user knows what's nearby */}
      <div className="flex items-stretch gap-0 overflow-x-auto pb-0 mb-3 border-b hairline" style={{ scrollbarWidth: "none" }}>
        {panels.map((p, i) => {
          const isActive = i === active;
          return (
            <button
              key={p.id}
              onClick={() => setActive(i)}
              className="shrink-0 px-3.5 py-2.5 text-left transition-all relative group"
              style={{
                borderBottom: "2px solid",
                borderBottomColor: isActive ? "var(--spec-canonical)" : "transparent",
                marginBottom: -1,
                background: isActive ? "var(--paper-2)" : "transparent",
              }}
            >
              <div className="flex items-baseline gap-1.5 mb-0.5">
                <span
                  className="mono text-[9.5px] tracking-[0.18em] uppercase font-semibold"
                  style={{ color: isActive ? "var(--spec-canonical)" : "var(--ink-faint)" }}
                >
                  {p.num}
                </span>
                <span className="mono text-[9px] tracking-[0.18em] uppercase text-[color:var(--ink-faint)]">
                  {p.en}
                </span>
              </div>
              <div className="flex items-baseline gap-2">
                <span
                  className="serif text-[14px] font-semibold leading-tight"
                  style={{
                    letterSpacing: "-0.012em",
                    color: isActive ? "var(--spec-canonical)" : "var(--ink-mid)",
                  }}
                >
                  {p.label}
                </span>
                {p.count != null && (
                  <span
                    className="mono text-[10px] font-semibold tabular-nums tracking-[0.04em]"
                    style={{ color: isActive ? "var(--ink)" : "var(--ink-mid)" }}
                  >
                    {String(p.count).padStart(2, "0")}
                  </span>
                )}
                {p.count == null && p.unit && (
                  <span
                    className="mono text-[9px] tracking-[0.18em] uppercase font-medium"
                    style={{ color: isActive ? "var(--ink-mid)" : "var(--ink-faint)" }}
                  >
                    {p.unit}
                  </span>
                )}
              </div>
            </button>
          );
        })}
      </div>

      {/* Spread viewport — single box, swipe horizontally */}
      <div
        className="overflow-hidden"
        style={{
          background: "var(--paper-2)",
          border: "1px solid var(--rule)",
          borderRadius: 2,
          height: vh ? `${vh + 40}px` : "auto",
          transition: "height 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          touchAction: "pan-y",
          boxShadow: "inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -1px 0 rgba(24,24,27,0.04)",
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div
          className="flex items-start"
          style={{
            transform: `translateX(calc(${-active * 100}% + ${dragOffset}px))`,
            transition: drag.active && drag.locked === "x"
              ? "none"
              : "transform 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          }}
        >
          {panels.map((p, i) => (
            <div
              key={p.id}
              ref={(el) => { panelRefs.current[i] = el; }}
              className="shrink-0 w-full p-5"
            >
              {p.node}
            </div>
          ))}
        </div>
      </div>

      {/* Indicator + arrows */}
      <div className="flex items-center justify-between gap-3 mt-3.5 px-1">
        <button
          onClick={() => go(-1)}
          disabled={active === 0}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="이전 spread"
        >
          <span className="serif text-[14px] leading-none">←</span>
        </button>
        <div className="flex items-center gap-1.5">
          {panels.map((p, i) => (
            <button
              key={p.id}
              onClick={() => setActive(i)}
              className="transition-all"
              style={{
                width: i === active ? 22 : 5,
                height: 4,
                background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                opacity: i === active ? 1 : 0.4,
                borderRadius: 0,
              }}
              aria-label={`spread ${i + 1}`}
            />
          ))}
        </div>
        <button
          onClick={() => go(1)}
          disabled={active === panels.length - 1}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="다음 spread"
        >
          <span className="serif text-[14px] leading-none">→</span>
        </button>
      </div>

      {/* Position label */}
      <div className="text-center mono text-[10px] uppercase tracking-[0.18em] text-[color:var(--ink-mid)] mt-2.5 tabular-nums">
        SPREAD <span className="text-[color:var(--ink)] font-semibold">{panels[active].num}</span> / {String(panels.length).padStart(2, "0")} <span className="text-[color:var(--rule-strong)] mx-1.5">·</span> {panels[active].en}
      </div>
    </div>
  );
}

// DECK — carousel
// ============================================================

function Deck({ panels, onCorrect }) {
  const [active, setActive] = useState(0);
  const [expandedMap, setExpandedMap] = useState({});
  // Touch with axis lock — only treats horizontal drag as swipe, vertical = page scroll
  const [drag, setDrag] = useState({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  const [viewportH, setViewportH] = useState(0);
  const cardRefs = useRef({});

  const total = panels.length;

  useEffect(() => {
    const measure = () => {
      const el = cardRefs.current[active];
      if (el) setViewportH(el.offsetHeight);
    };
    measure();
    let ro;
    if (typeof ResizeObserver !== "undefined") {
      ro = new ResizeObserver(measure);
      Object.values(cardRefs.current).forEach((el) => el && ro.observe(el));
    }
    window.addEventListener("resize", measure);
    const t = setTimeout(measure, 100);
    return () => {
      window.removeEventListener("resize", measure);
      if (ro) ro.disconnect();
      clearTimeout(t);
    };
  }, [active, expandedMap]);

  const go = useCallback((dir) => {
    setActive((a) => {
      const next = a + dir;
      if (next < 0 || next >= total) return a;
      return next;
    });
  }, [total]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
      if (e.key === "ArrowLeft") go(-1);
      if (e.key === "ArrowRight") go(1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [go]);

  // Touch handlers — axis-locked
  const onTouchStart = (e) => {
    const t = e.touches[0];
    setDrag({ active: true, startX: t.clientX, startY: t.clientY, dx: 0, dy: 0, locked: null });
  };
  const onTouchMove = (e) => {
    if (!drag.active) return;
    const t = e.touches[0];
    const dx = t.clientX - drag.startX;
    const dy = t.clientY - drag.startY;
    let locked = drag.locked;
    if (!locked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
    }
    setDrag((d) => ({ ...d, dx, dy, locked }));
  };
  const onTouchEnd = () => {
    if (!drag.active) return;
    if (drag.locked === "x") {
      const threshold = 55;
      if (drag.dx > threshold) go(-1);
      else if (drag.dx < -threshold) go(1);
    }
    setDrag({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  };
  // No mouse drag — desktop uses arrows + ←→ keys + indicator (avoids scroll-wheel conflict)

  const toggleExpand = (id) => setExpandedMap((m) => ({ ...m, [id]: !m[id] }));

  // 3D peek params
  const PEEK_TX = 78;     // % of card width offset for adjacent
  const PEEK_ROT = 14;    // rotateY degrees
  const PEEK_TZ = 140;    // translateZ pull-back
  const PEEK_OPACITY = 0.34;
  const dragOffsetActive = drag.locked === "x" ? drag.dx : 0;

  return (
    <div className="select-none">
      {/* Editorial frame mast */}
      <div className="mx-auto" style={{ maxWidth: 620 }}>
        <div className="px-4 pt-4 pb-2 flex items-center justify-between mono text-[10px] uppercase tracking-[0.22em] text-[color:var(--ink-mid)]">
          <span>{SITE_VOL}</span>
          <span className="flex items-center gap-1.5">
            <span style={{ color: "var(--spec-canonical)" }}>◆</span>
            <span>{SITE_DATE_LONG}</span>
            <span style={{ color: "var(--spec-canonical)" }}>◆</span>
          </span>
          <span className="tabular-nums">D−{DAYS_TO_ELECTION}</span>
        </div>
      </div>

      {/* 3D viewport — perspective container with absolutely-positioned cards */}
      <div
        className="relative mx-auto"
        style={{
          maxWidth: 620,
          perspective: "2000px",
          height: viewportH ? `${viewportH + 32}px` : "auto",
          transition: "height 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          touchAction: "pan-y",
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        {panels.map((p, i) => {
          const diff = i - active;
          const isActive = diff === 0;
          const isAdj = Math.abs(diff) === 1;
          const isFar = Math.abs(diff) >= 2;
          // Direction-aware transforms
          const tx = `${diff * PEEK_TX}%`;
          const rotY = isActive ? 0 : Math.sign(diff) * -PEEK_ROT;
          const tz = isActive ? 0 : -PEEK_TZ;
          const dragX = isActive ? dragOffsetActive : 0;

          return (
            <div
              key={p.id}
              ref={(el) => { cardRefs.current[i] = el; }}
              className="absolute top-0"
              style={{
                left: "50%",
                width: "100%",
                maxWidth: 504,
                padding: "0 12px",
                transform: `translate3d(calc(-50% + ${tx} + ${dragX}px), 0, ${tz}px) rotateY(${rotY}deg)`,
                transformStyle: "preserve-3d",
                transformOrigin: "center center",
                opacity: isFar ? 0 : isAdj ? PEEK_OPACITY : 1,
                filter: isActive ? "none" : "blur(1.4px)",
                pointerEvents: isActive ? "auto" : isAdj ? "auto" : "none",
                cursor: isAdj ? "pointer" : "default",
                transition: drag.active && drag.locked === "x"
                  ? "none"
                  : "transform 0.55s cubic-bezier(0.22, 0.8, 0.25, 1), opacity 0.45s, filter 0.45s",
                zIndex: 100 - Math.abs(diff),
                visibility: isFar ? "hidden" : "visible",
              }}
              onClick={() => isAdj && setActive(i)}
            >
              {p.render(expandedMap[p.id], () => toggleExpand(p.id), onCorrect)}
            </div>
          );
        })}
      </div>

      {/* Indicator + arrows */}
      <div className="mx-auto" style={{ maxWidth: 620 }}>
        <div className="flex items-center justify-between gap-3 px-4 pt-2 pb-4">
          <button
            onClick={() => go(-1)}
            disabled={active === 0}
            className="w-10 h-10 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
            style={{ background: "white", borderRadius: 1 }}
            aria-label="이전"
          >
            <span className="serif" style={{ fontSize: 18, lineHeight: 1 }}>←</span>
          </button>
          <div className="flex items-center gap-1.5">
            {panels.map((p, i) => (
              <button
                key={p.id}
                onClick={() => setActive(i)}
                className="deck-dot"
                style={{
                  width: i === active ? 26 : 6,
                  height: 6,
                  background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                  opacity: i === active ? 1 : 0.4,
                  borderRadius: 0,
                }}
                aria-label={`${i + 1}번째 카드`}
              />
            ))}
          </div>
          <button
            onClick={() => go(1)}
            disabled={active === total - 1}
            className="w-10 h-10 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
            style={{ background: "white", borderRadius: 1 }}
            aria-label="다음"
          >
            <span className="serif" style={{ fontSize: 18, lineHeight: 1 }}>→</span>
          </button>
        </div>

        <div className="ornament-rule px-6 mb-2">
          <span style={{ color: "var(--rule-strong)" }}>◆</span>
        </div>

        <div className="text-center mono text-[10px] uppercase tracking-[0.22em] text-[color:var(--ink-mid)] pb-1">
          swipe · 좌우 화살표 · 인디케이터
        </div>
        <div className="text-center mono text-[11px] tabular-nums text-[color:var(--ink-soft)] pb-3">
          <span className="num-display text-[14px] text-[color:var(--ink)]">{String(active + 1).padStart(2, "0")}</span>
          <span className="text-[color:var(--ink-faint)] mx-1.5">/</span>
          <span className="text-[color:var(--ink-mid)] tabular-nums">{String(total).padStart(2, "0")}</span>
          <span className="mx-2 text-[color:var(--rule-strong)]">·</span>
          <span className="uppercase tracking-[0.16em]">{panels[active].title}</span>
        </div>
      </div>
    </div>
  );
}

            <ul className="space-y-2">
              {humanOnly.map((a, i) => (
                <li key={i} className="flex gap-2 serif" style={{ letterSpacing: "-0.005em" }}>
                  <span className="text-[color:var(--ink-faint)]">·</span>{a}
                </li>
              ))}
            </ul>
          </div>
        </div>
      </Section>

      <Section number="06" title="아직 구현되지 않은 영역">
        <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] mb-4 leading-relaxed">
          설계상 고려되었지만 MVP 범위에서 잠시 뒤로 미룬 영역. 공동 설계·기여 여지가 있는 지점이기도 합니다.
        </p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5">
          {notYet.map((it, i) => (
            <div key={i} className="bg-[color:var(--paper-2)] border border-dashed hairline p-3" style={{ borderRadius: 1 }}>
              <div className="serif text-[13px] font-semibold mb-1" style={{ letterSpacing: "-0.012em" }}>{it.title}</div>
              <div className="text-[11.5px] text-[color:var(--ink-soft)] leading-relaxed">{it.desc}</div>
            </div>
          ))}
        </div>
      </Section>

      <Section number="07" title="책임자 · 정정 · 제보">
        <div className="space-y-1.5 text-[13px]">
          <div className="serif" style={{ letterSpacing: "-0.005em" }}>책임자: 강동재</div>
          <div className="text-[color:var(--ink-soft)]">
            <span className="cap mr-2">연락</span>
            <span className="mono tabular-nums">hello@prism.kr</span>
            <span className="text-[10px] ml-1.5 text-[color:var(--ink-faint)]">(가상 · 실 발급 후 갱신)</span>
          </div>
          <div className="text-[color:var(--ink-soft)]">
            <span className="cap mr-2">정정</span>
            <span className="serif italic">카드 하단 “정정 요청” 버튼 — 24시간 내 응답</span>
          </div>
        </div>
      </Section>

      <Section number="08" title="PRD 변경 history">
        <p className="serif text-[13px] leading-relaxed">
          PRISM의 product 정의는 GitHub public repo에 공개되어 있습니다. 변경 이력은 git history로 추적 가능합니다.
        </p>
      </Section>

      {/* Colophon */}
      <div className="mt-12 pt-6 border-t border-rule-strong" style={{ borderTop: "1px solid var(--rule-strong)" }}>
        <div className="cap mb-3">Colophon</div>
        <p className="serif italic text-[12px] text-[color:var(--ink-soft)] leading-relaxed">
          본문은 Pretendard로, 디스플레이는 Source Serif 4로,
          metadata와 데이터 라벨은 JetBrains Mono로 조판합니다.
          분광 grade는 indigo–teal–amber–rose–stone의 5색 위계로 출처 성격을 구분합니다.
        </p>
      </div>
    </div>
  );
}

function Section({ number, title, children }) {
  return (
    <section className="mb-9">
      <header className="flex items-baseline gap-3 mb-4">
        <span className="claim-num">{number}</span>
        <h3 className="cap-strong">{title}</h3>
        <span className="flex-1 border-t hairline self-center" />
      </header>
      {children}
    </section>
  );
}

// ============================================================
// CORRECTION FORM MODAL
// ============================================================

function CorrectionFormModal({ card, onClose }) {
  const [submitted, setSubmitted] = useState(false);
  if (!card) return null;
  return (
    <div className="fixed inset-0 z-50 bg-black/45 flex items-center justify-center p-3" onClick={onClose}>
      <div
        className="bg-white max-w-md w-full p-6 max-h-[88vh] overflow-y-auto editorial-card"
        onClick={(e) => e.stopPropagation()}
      >
        {!submitted ? (
          <>
            <header className="flex items-start justify-between mb-4 gap-3">
              <div>
                <div className="cap mb-1.5">정정 요청</div>
                <h3 className="serif text-[18px] font-semibold leading-tight" style={{ letterSpacing: "-0.014em" }}>{card.title}</h3>
              </div>
              <button onClick={onClose} className="text-[color:var(--ink-faint)] hover:text-[color:var(--ink)] text-[20px] leading-none">✕</button>
            </header>
            <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed mb-5 pl-3 border-l-2 border-canonical">
              사실 오류 발견 시 정정 요청을 보내주세요. 24시간 내 큐레이터가 검토하고 응답합니다.
              검증된 정정은 retraction protocol에 따라 카드가 수정되며 revision history에 표시됩니다.
            </p>
            <form onSubmit={(e) => { e.preventDefault(); setSubmitted(true); }} className="space-y-3.5">
              <Field label="카드 URL">
                <input className="form-input mono tabular-nums text-[12px]" defaultValue={`prism.kr/cards/${card.id}`} readOnly />
              </Field>
              <Field label="정정 부분 *">
                <textarea className="form-input" rows="3" placeholder="어느 부분에 어떤 사실 오류가 있는지 알려주세요." required></textarea>
              </Field>
              <Field label="근거 출처 (link) *">
                <input className="form-input" type="url" placeholder="https://" required />
              </Field>
              <Field label="연락처 (선택)">
                <input className="form-input" type="email" placeholder="응답 받을 이메일" />
              </Field>
              <div className="flex items-center justify-end gap-2 pt-2 mono uppercase tracking-[0.16em] text-[11px]">
                <button type="button" onClick={onClose} className="share-btn px-3 py-2 border hairline" style={{ borderRadius: 1 }}>취소</button>
                <button
                  type="submit"
                  className="px-4 py-2 font-semibold text-white"
                  style={{ background: "var(--spec-canonical)", borderRadius: 1 }}
                >
                  제출
                </button>
              </div>
            </form>
          </>
        ) : (
          <>
            <div className="cap-strong ink-canonical mb-2">접수되었습니다</div>
            <h3 className="serif text-[18px] font-semibold leading-tight mb-3" style={{ letterSpacing: "-0.014em" }}>
              정정 요청이 큐레이터에게 전달되었습니다
            </h3>
            <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed mb-5">
              24시간 내 검토 후 응답드리겠습니다. 검증된 정정은 카드에 반영되며 revision history에 표시됩니다.
            </p>
            <button onClick={onClose} className="share-btn px-3 py-2 border hairline mono uppercase tracking-[0.16em] text-[11px]" style={{ borderRadius: 1 }}>닫기</button>
          </>
        )}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="cap block mb-1.5">{label}</label>
      {children}
    </div>
  );
}

// ============================================================
// SHELL
// ============================================================

function Header({ page, setPage }) {
  return (
    <header className="sticky top-0 z-40 bg-[color:var(--paper)]/96 backdrop-blur border-b" style={{ borderColor: "var(--rule)" }}>
      <div className="max-w-2xl mx-auto px-5 h-14 flex items-center justify-between">
        <button onClick={() => setPage("home")}>
          <Logo size="sm" />
        </button>
        <nav className="flex items-center gap-5 text-[12px] mono uppercase tracking-[0.16em] text-[color:var(--ink-mid)]">
          <button
            onClick={() => setPage("home")}
            className={`pb-1 hover:text-[color:var(--ink)] transition-colors ${page === "home" ? "nav-active" : ""}`}
          >
            오늘의 흐름
          </button>
          <button
            onClick={() => setPage("how")}
            className={`pb-1 hover:text-[color:var(--ink)] transition-colors ${page === "how" ? "nav-active" : ""}`}
          >
            How we work
          </button>
        </nav>
      </div>
    </header>
  );
}

function Footer() {
  return (
    <footer className="mt-12 border-t" style={{ borderColor: "var(--rule-strong)", background: "var(--paper-2)" }}>
      <div className="max-w-2xl mx-auto px-6 py-9">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-7 text-[12px] text-[color:var(--ink-soft)]">
          <div>
            <Logo size="md" />
            <p className="serif italic mt-3 leading-relaxed text-[12.5px]">
              한국 정치 정보가 어떻게 변형되며 퍼지는지 매일 추적하는 흐름 매체.
            </p>
          </div>
          <div>
            <div className="cap-strong mb-2.5">우리가 무엇이 아닌가</div>
            <ul className="space-y-1 leading-relaxed serif text-[12.5px]" style={{ letterSpacing: "-0.005em" }}>
              <li className="flex gap-2"><span className="text-[color:var(--ink-faint)]">·</span>팩트체크 도구가 아닙니다</li>
              <li className="flex gap-2"><span className="text-[color:var(--ink-faint)]">·</span>후보 평가 도구가 아닙니다</li>
              <li className="flex gap-2"><span className="text-[color:var(--ink-faint)]">·</span>투표 추천 도구가 아닙니다</li>
            </ul>
          </div>
          <div>
            <div className="cap-strong mb-2.5">정정 · 제보 · 문의</div>
            <p className="leading-relaxed mono tabular-nums text-[12.5px] text-[color:var(--ink)]">
              hello@prism.kr <span className="text-[10px] text-[color:var(--ink-faint)]">(가상)</span>
            </p>
            <p className="leading-relaxed mt-1.5 mono text-[11px] text-[color:var(--ink-mid)]">
              github.com/dongjae-kang/prism-provenance
            </p>
          </div>
        </div>
      </div>
      <div className="border-t hairline">
        <div className="max-w-2xl mx-auto px-6 py-3 mono text-[10px] uppercase tracking-[0.18em] text-[color:var(--ink-mid)] flex justify-between items-center">
          <span className="tabular-nums">© 2026 PRISM · LO-FI 데모 · 2026.05.06</span>
          <span className="flex items-center gap-1.5">
            <span style={{ color: "var(--spec-canonical)" }}>◆</span>
            <span className="tabular-nums">v3 · trend deck</span>
          </span>
        </div>
      </div>
    </footer>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [page, setPage] = useState("home");
  const [correctingCard, setCorrectingCard] = useState(null);

  const panels = useMemo(() => [
    { id: "hero", title: "Hero", render: () => <HeroCard /> },
    ...DAILY_CARDS.map((c, i) => ({
      id: c.id,
      title: `Trend ${c.trendNo}`,
      render: (expanded, toggle, onCorrect) => (
        <TrendCard card={c} onCorrect={onCorrect} />
      ),
    })),
    { id: "weekly", title: "Weekly", render: () => <WeeklyFlowCard /> },
  ], []);

  return (
    <>
      <Header page={page} setPage={setPage} />
      {page === "home" && (
        <main className="pb-6">
          <Deck panels={panels} onCorrect={setCorrectingCard} />
        </main>
      )}
      {page === "how" && (
        <main>
          <HowWeWork />
        </main>
      )}
      <Footer />
      <CorrectionFormModal card={correctingCard} onClose={() => setCorrectingCard(null)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
