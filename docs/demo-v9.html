<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PRISM v9 — real data integration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      /* Spectrum 5 grade — 출처 성격별 색 (deepened for editorial weight) */
      --spec-canonical:    #1e1b4b;   /* indigo-950 */
      --spec-direct:       #134e4a;   /* teal-900 */
      --spec-partial:      #92400e;   /* amber-800 */
      --spec-transformed:  #9f1239;   /* rose-800 */
      --spec-unverifiable: #57534e;   /* stone-600 */

      /* Editorial paper palette */
      --paper:        #f6f3ec;        /* warm cream */
      --paper-2:      #ede8db;        /* deeper cream */
      --paper-3:      #e3dccb;
      --paper-4:      #d6cfbb;
      --ink:          #18181b;        /* charcoal */
      --ink-soft:     #3f3f46;
      --ink-mid:      #71717a;
      --ink-faint:    #a8a29e;
      --rule:         #c8c2af;
      --rule-soft:    #dcd6c4;
      --rule-strong:  #8d8674;

      /* Accent for editorial chrome */
      --gold-leaf:    #a16207;        /* yellow-700 */

      /* Multi-layer paper depth — editorial 3D shadow stack */
      --card-shadow:
        0 1px 0 rgba(24,24,27,0.05),
        0 2px 4px -2px rgba(24,24,27,0.06),
        0 12px 28px -14px rgba(24,24,27,0.16),
        0 28px 56px -28px rgba(24,24,27,0.20),
        0 56px 96px -48px rgba(24,24,27,0.18);
      --card-shadow-active:
        0 1px 0 rgba(24,24,27,0.08),
        0 3px 6px -2px rgba(24,24,27,0.10),
        0 18px 36px -16px rgba(24,24,27,0.22),
        0 40px 72px -32px rgba(24,24,27,0.28),
        0 72px 120px -56px rgba(24,24,27,0.22);
      --card-shadow-soft:
        0 1px 0 rgba(24,24,27,0.05),
        0 6px 16px -8px rgba(24,24,27,0.10);
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* Use overflow-x: clip (modern) instead of hidden to avoid hijacking
       the document scroll context. Hidden creates a new scroll container
       on the root element which can stop vertical wheel scrolling. */
    html { overflow-x: clip; }
    body {
      overflow-x: clip;
      overscroll-behavior-y: contain;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'tnum', 'ss01', 'ss02';
    }

    /* Editorial paper grain — subtle radial noise */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 22% 18%, rgba(30,27,75,0.022) 0, transparent 28%),
        radial-gradient(circle at 78% 82%, rgba(159,18,57,0.018) 0, transparent 26%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0.008) 0, transparent 60%);
    }

    #root { position: relative; z-index: 1; }

    .serif {
      font-family: 'Source Serif 4', 'Pretendard', 'Apple SD Gothic Neo', serif;
      font-optical-sizing: auto;
    }
    .mono {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      font-feature-settings: 'tnum';
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* Editorial micro-typography */
    .cap {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--ink-mid);
    }
    .cap-strong {
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--ink);
    }
    .num-display {
      font-family: 'JetBrains Mono', monospace;
      font-feature-settings: 'tnum';
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .num-mark {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 10.5px;
      letter-spacing: 0.04em;
      color: var(--ink-mid);
    }

    /* Spectrum color utilities */
    .ink-canonical    { color: var(--spec-canonical); }
    .ink-direct       { color: var(--spec-direct); }
    .ink-partial      { color: var(--spec-partial); }
    .ink-transformed  { color: var(--spec-transformed); }
    .ink-unverifiable { color: var(--spec-unverifiable); }
    .bg-canonical     { background: var(--spec-canonical); }
    .bg-direct        { background: var(--spec-direct); }
    .bg-partial       { background: var(--spec-partial); }
    .bg-transformed   { background: var(--spec-transformed); }
    .bg-unverifiable  { background: var(--spec-unverifiable); }
    .border-canonical { border-color: var(--spec-canonical); }
    .border-direct    { border-color: var(--spec-direct); }
    .border-partial   { border-color: var(--spec-partial); }
    .border-transformed { border-color: var(--spec-transformed); }
    .border-unverifiable { border-color: var(--spec-unverifiable); }

    .hairline { border-color: var(--rule); }

    /* Editorial dropcap */
    .dropcap::first-letter {
      font-family: 'Source Serif 4', serif;
      float: left;
      font-size: 3.2em;
      line-height: 0.86;
      font-weight: 600;
      padding: 0.05em 0.08em 0 0;
      color: var(--spec-canonical);
    }

    /* Soft pulse */
    @keyframes softPulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.18); }
    }
    .pulse-dot { animation: softPulse 2.6s ease-in-out infinite; }

    /* Spectrum dispersion — hero illustration animation */
    @keyframes shimmer {
      0%, 100% { opacity: 0.78; }
      50%      { opacity: 1; }
    }
    .shimmer { animation: shimmer 4s ease-in-out infinite; }

    /* Card chrome — multi-layer paper with subtle 3D depth */
    .editorial-card {
      background: white;
      border: 1px solid var(--rule);
      border-radius: 2px;
      box-shadow: var(--card-shadow);
      position: relative;
      /* Inner paper sheen — top edge highlight */
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.7) 0%, transparent 6%, transparent 94%, rgba(24,24,27,0.025) 100%),
        linear-gradient(90deg, rgba(24,24,27,0.018) 0%, transparent 4%, transparent 96%, rgba(24,24,27,0.018) 100%),
        linear-gradient(white, white);
    }
    /* Spectrum gradient top edge bar */
    .editorial-card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 3px;
      background: linear-gradient(90deg,
        var(--spec-canonical) 0%,
        var(--spec-direct) 25%,
        var(--spec-partial) 50%,
        var(--spec-transformed) 75%,
        var(--spec-unverifiable) 100%);
      opacity: 0.92;
      border-radius: 2px 2px 0 0;
    }
    /* Bottom edge — subtle depth */
    .editorial-card::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 6%; right: 6%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(24,24,27,0.18), transparent);
      filter: blur(1px);
      pointer-events: none;
    }

    .editorial-card-soft {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 2px;
      box-shadow: var(--card-shadow-soft);
    }

    /* Deck transitions */
    .deck-track {
      transition: transform 0.48s cubic-bezier(0.22, 0.8, 0.25, 1);
      will-change: transform;
    }
    .deck-track.dragging { transition: none; }

    /* Headline rhythm */
    .headline-display {
      font-family: 'Source Serif 4', 'Pretendard', serif;
      font-weight: 600;
      letter-spacing: -0.024em;
      line-height: 1.1;
    }
    .headline-trend {
      font-family: 'Source Serif 4', 'Pretendard', serif;
      font-weight: 600;
      letter-spacing: -0.018em;
      line-height: 1.18;
    }
    .deck-overline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      font-weight: 500;
    }

    /* Center-ornament rule */
    .ornament-rule {
      display: flex; align-items: center; gap: 12px;
      color: var(--rule-strong);
      font-size: 10px;
    }
    .ornament-rule::before, .ornament-rule::after {
      content: ''; flex: 1;
      border-top: 1px solid var(--rule);
    }

    /* Form */
    .form-input {
      width: 100%; padding: 0.6rem 0.75rem;
      border: 1px solid var(--rule); border-radius: 2px;
      font-size: 14px; font-family: inherit;
      background: white;
      color: var(--ink);
    }
    .form-input:focus {
      outline: 2px solid var(--spec-canonical);
      outline-offset: -1px;
    }

    /* Drill-down expand */
    .expand-region {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.65s cubic-bezier(0.22, 0.8, 0.25, 1), opacity 0.45s;
    }
    .expand-region.open {
      max-height: 9000px;
      opacity: 1;
    }

    /* Nav active */
    .nav-active {
      color: var(--ink);
      position: relative;
    }
    .nav-active::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1.5px;
      background: var(--spec-canonical);
    }

    /* Numbered claim marker — editorial */
    .claim-num {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 10.5px;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
    }

    /* Pull quote */
    .pull-quote {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.005em;
      line-height: 1.5;
      color: var(--ink-soft);
    }
    .pull-quote::before {
      content: '\201C';
      font-family: 'Source Serif 4', serif;
      font-size: 2.2em;
      line-height: 0;
      vertical-align: -0.34em;
      color: var(--spec-canonical);
      margin-right: 4px;
    }

    /* Section label with rule */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      font-weight: 500;
    }
    .section-label::after {
      content: ''; flex: 1;
      border-top: 1px solid var(--rule);
    }

    /* Mark — small caps inline label */
    .mark {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid currentColor;
      border-radius: 1px;
      line-height: 1;
    }

    /* Stats display */
    .stat-block {
      border-left: 1px solid var(--rule);
      padding-left: 14px;
    }
    .stat-block:first-child { border-left: 0; padding-left: 0; }

    /* dashed unverifiable */
    .dashed-edge { stroke-dasharray: 4 4; }

    /* Indicator dot */
    .deck-dot {
      transition: width 0.3s ease, background-color 0.3s ease, opacity 0.3s ease;
    }

    /* Subtle hover on share buttons */
    .share-btn {
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }
    .share-btn:hover {
      background: var(--paper-2);
      border-color: var(--rule-strong);
    }

    /* Native horizontal snap scroller — used inside spread panels */
    .snap-scroller {
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .snap-scroller::-webkit-scrollbar { display: none; }
    .snap-item { scroll-snap-align: center; }

    /* Mini-card depth — used in inner-inner carousel */
    .mini-card {
      box-shadow:
        0 1px 0 rgba(24,24,27,0.05),
        0 4px 10px -4px rgba(24,24,27,0.08),
        0 10px 24px -12px rgba(24,24,27,0.14);
    }

    @media (max-width: 380px) {
      .card-pad { padding: 20px !important; }
    }

    /* ═══════════════════════════════════════════════════════
       v4 ROUNDED — 현미 디자인 톤 cascade
       editorial sharp 1-2px → warm rounded 14-24px
       cool zinc → warm brown
       5-layer paper depth → soft single-layer warm shadow
       ═══════════════════════════════════════════════════════ */

    :root {
      /* Warm cream palette (현미 base) — overrides editorial cool */
      --paper:        #FAF6EF;
      --paper-2:      #F4ECDF;
      --paper-3:      #EDE3D2;
      --paper-4:      #E8DCC4;
      --ink:          #2B2520;
      --ink-soft:     #5A4F44;
      --ink-mid:      #7A6E62;
      --ink-faint:    #B5A99B;
      --rule:         #EDE3D2;
      --rule-soft:    #F4ECDF;
      --rule-strong:  #D9CDB6;

      /* Single coral accent (현미) layered on per-issue */
      --accent:       #E8825D;
      --accent-soft:  #FBE9DE;
      --accent-deep:  #C45F3A;
      --green-soft:   #E8F0E5;
      --green-deep:   #4A6B3F;

      /* Spectrum — warmer, less saturated than editorial v3 */
      --spec-canonical:    #6B7AA1;   /* 청록 indigo (was #1e1b4b) */
      --spec-direct:       #4A6B3F;   /* warm green */
      --spec-partial:      #C68A47;   /* amber */
      --spec-transformed:  #B26F8C;   /* rose mauve */
      --spec-unverifiable: #8E8478;   /* warm grey */

      /* Soft single-layer warm shadow (현미) — replaces 5-layer paper depth */
      --card-shadow:
        0 4px 16px rgba(80, 60, 40, 0.06),
        0 1px 3px rgba(80, 60, 40, 0.04);
      --card-shadow-active:
        0 8px 28px rgba(80, 60, 40, 0.10),
        0 2px 6px rgba(80, 60, 40, 0.06);
      --card-shadow-soft:
        0 2px 8px rgba(80, 60, 40, 0.04);

      --gold-leaf:    #C68A47;
    }

    /* Body — slightly more relaxed line-height */
    body { line-height: 1.7; letter-spacing: -0.005em; }

    /* Editorial paper grain — softer */
    body::before {
      background-image:
        radial-gradient(circle at 22% 18%, rgba(232, 130, 93, 0.025) 0, transparent 28%),
        radial-gradient(circle at 78% 82%, rgba(178, 111, 140, 0.018) 0, transparent 26%),
        radial-gradient(circle at 50% 50%, rgba(80, 60, 40, 0.008) 0, transparent 60%);
    }

    /* Card chrome — rounded warm */
    .editorial-card {
      background: white;
      border: 1px solid var(--rule);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      background-image: none;
      transition: box-shadow 0.25s ease, transform 0.18s ease;
    }
    .editorial-card:hover {
      box-shadow: var(--card-shadow-active);
    }

    /* Spectrum top edge — soft gradient (not a sharp bar) */
    .editorial-card::before {
      display: none;
    }
    .editorial-card::after {
      display: none;
    }

    .editorial-card-soft {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: 20px;
      box-shadow: var(--card-shadow-soft);
    }

    /* Headlines — Pretendard primary (sans), serif optional */
    .headline-display {
      font-family: 'Pretendard', 'Source Serif 4', sans-serif;
      font-weight: 800;
      letter-spacing: -0.022em;
      line-height: 1.18;
    }
    .headline-trend {
      font-family: 'Pretendard', sans-serif;
      font-weight: 700;
      letter-spacing: -0.018em;
      line-height: 1.32;
    }

    /* Form inputs — rounded */
    .form-input {
      border-radius: 14px;
      padding: 0.75rem 1rem;
      background: var(--paper-2);
      border: 1.5px solid transparent;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
    }

    /* Mark — rounded pill */
    .mark {
      border-radius: 100px;
      padding: 3px 9px;
      letter-spacing: 0.12em;
    }

    /* Section label — softer (less letter-spacing aggressive) */
    .section-label {
      font-size: 11.5px;
      letter-spacing: 0.12em;
      color: var(--ink-mid);
      font-weight: 600;
    }
    .section-label::after { border-top-color: var(--rule); }

    /* cap, cap-strong — softer */
    .cap {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--ink-mid);
      font-weight: 600;
    }
    .cap-strong {
      font-size: 11.5px;
      letter-spacing: 0.14em;
      color: var(--ink);
      font-weight: 700;
    }

    /* mini-card — rounded */
    .mini-card {
      border-radius: 14px !important;
      box-shadow:
        0 2px 8px rgba(80, 60, 40, 0.05),
        0 8px 20px -8px rgba(80, 60, 40, 0.08);
    }

    /* Mini-card override (Tailwind border + radius) */
    .mini-card[style] {
      border-radius: 14px !important;
    }

    /* Buttons — rounded pill */
    .share-btn,
    button.share-btn {
      border-radius: 100px !important;
    }

    /* Override inline rounded:1 anywhere via more specific match */
    [style*="borderRadius: 1"],
    [style*="border-radius: 1px"],
    [style*="border-radius:1px"] {
      border-radius: 12px !important;
    }
    [style*="borderRadius: 2"],
    [style*="border-radius: 2px"] {
      border-radius: 14px !important;
    }

    /* Nav active — coral underline */
    .nav-active::after {
      background: var(--accent);
      height: 2px;
      bottom: -4px;
      border-radius: 2px;
    }

    /* Hairline — softer */
    .hairline {
      border-color: var(--rule);
    }

    /* Pulse — coral */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.6; transform: scale(1.25); }
    }

    /* Header — slightly taller, warm */
    header.sticky {
      background: rgba(250, 246, 239, 0.94) !important;
    }

    /* Tab nav — pill shape */
    nav button {
      letter-spacing: 0.04em;
      text-transform: none;
      font-size: 13.5px;
      font-family: 'Pretendard', sans-serif;
    }

    /* Issue label / pill — rounded pill */
    [class*="px-1.5 py-0.5"][class*="border"],
    [class*="px-1.5"][class*="border"][class*="rounded-sm"],
    [class*="px-2"][class*="border"][class*="rounded-sm"],
    [class*="px-3"][class*="border"][class*="rounded-sm"] {
      border-radius: 100px !important;
    }

    /* Spectrum dot pulse */
    .pulse-dot { animation: pulse 2.4s ease-in-out infinite; }

    /* Friendly link underline */
    button.underline { text-underline-offset: 4px; text-decoration-thickness: 1.5px; }

    /* Page-level breathing room */
    main { padding-top: 8px; }

    /* Hero card highlight gradient — accent soft */
    .hero-hi-warm {
      background: linear-gradient(180deg, transparent 62%, rgba(24,24,27,0.10) 62%);
      padding: 0 2px;
    }

    /* ═══════════════════════════════════════════════════════
       v7 PRISM · CINEMATIC HOLOGRAPHIC · LIQUID GLASS
       — deep holographic backdrop, 3D prism cluster, caustics
       — Pretendard everywhere; no mono / no italic
       — every border = liquid glass; original shapes preserved
       ═══════════════════════════════════════════════════════ */

    :root {
      --paper:        #ffffff;
      --paper-2:      rgba(255,255,255,0.55);
      --paper-3:      rgba(255,255,255,0.40);
      --paper-4:      rgba(255,255,255,0.28);
      --ink:          #0a0a14;
      --ink-soft:     #1a1a26;
      --ink-mid:      #4a4a5e;
      --ink-faint:    #8a8aa0;
      --rule:         rgba(10,10,20,0.10);
      --rule-soft:    rgba(10,10,20,0.06);
      --rule-strong:  rgba(10,10,20,0.22);

      --accent:       #6b5cff;
      --accent-soft:  rgba(107,92,255,0.10);
      --accent-deep:  #3a2cd6;

      --spec-canonical:    #2a2a8a;
      --spec-direct:       #00a39a;
      --spec-partial:      #d97706;
      --spec-transformed:  #e11d74;
      --spec-unverifiable: #6e6a8e;
      --gold-leaf:         #6b5cff;

      /* Liquid glass tokens */
      --glass-bg:         rgba(255,255,255,0.72);
      --glass-bg-strong:  rgba(255,255,255,0.84);
      --glass-border:     rgba(255,255,255,0.85);
      --glass-shadow:
        0 1px 0 rgba(255,255,255,0.95) inset,
        0 -1px 0 rgba(120,140,200,0.18) inset,
        0 1px 1px rgba(255,255,255,0.6) inset,
        0 10px 28px -14px rgba(20,20,60,0.22),
        0 28px 60px -28px rgba(20,20,60,0.28);
      --glass-shadow-active:
        0 1px 0 rgba(255,255,255,1) inset,
        0 -1px 0 rgba(120,140,200,0.28) inset,
        0 18px 44px -14px rgba(20,20,60,0.30),
        0 44px 80px -32px rgba(20,20,60,0.36);
      --card-shadow:        var(--glass-shadow);
      --card-shadow-active: var(--glass-shadow-active);
      --card-shadow-soft:   0 8px 22px -12px rgba(20,20,60,0.22);
    }

    html, body { background: #ffffff; }

    body {

// authority_tier (1-5) → spec spectrum 매핑
// T1=권위 최고 → canonical, T5=권위 최저 → unverifiable
function tierToSpec(tier) {
  return ["canonical", "direct", "partial", "transformed", "unverifiable"][Math.max(0, Math.min(4, tier - 1))];
}

// Real sample (8 video + comments_inline) → v8 카드 schema (trail/diffusion/reception/kg)
function realTrendToCard(realTrend, mockCard) {
  if (!realTrend) return mockCard;
  const videos = [...realTrend.videos].sort(
    (a, b) => new Date(a.published_at) - new Date(b.published_at)
  );
  const fmtTime = (iso) => {
    const d = new Date(iso);
    return `${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
  };
  const ytWatch = (id) => `https://www.youtube.com/watch?v=${id}`;

  // §4.8 inline reaction: 각 video에 대표 댓글 1개 attached (likeCount 최고)
  const trail = videos.map((v) => {
    const cs = v.comments_inline || [];
    const top = cs.length > 0 ? cs.reduce((a, b) => (b.like_count > a.like_count ? b : a)) : null;
    return {
      time: fmtTime(v.published_at),
      actor: v.channel.title,
      outlet: `T${v.channel.authority_tier} · ${v.is_shorts ? "Shorts" : (v.duration_seconds < 180 ? "단편" : "영상")}`,
      spec: tierToSpec(v.channel.authority_tier),
      note: v.transcript_summary
        ? v.transcript_summary.slice(0, 110)
        : (v.thumbnail_description ? v.thumbnail_description.replace(/^# 이미지 설명\s*/, "").slice(0, 110) : v.title.slice(0, 80)),
      link: ytWatch(v.video_id),
      view: v.view_count,
      _video_id: v.video_id,
      _tier: v.channel.authority_tier,
      attachedComment: top
        ? { quote: top.text.slice(0, 90), source: v.channel.title, likes: top.like_count }
        : null,
    };
  });

  // Diffusion curve: raw 8 video를 publish 시간순 cumulative로 표시 (binning 없음)
  const t0 = new Date(videos[0].published_at).getTime();
  let cumulative = 0;
  const diffusion = videos.map((v) => {
    cumulative += v.view_count;
    const hour = (new Date(v.published_at).getTime() - t0) / 3600000;
    return { hour: Math.round(hour * 10) / 10, cumulative };
  });
  const peakIdx = diffusion.reduce((max, d, i) => {
    const prev = i > 0 ? diffusion[i - 1].cumulative : 0;
    const delta = d.cumulative - prev;
    return delta > (max.delta || 0) ? { i, delta, hour: d.hour } : max;
  }, { i: 0, delta: 0, hour: 0 });

  // Reception: trend-level top 4 comments, 80자 truncate
  const reception = (realTrend.comments_inline || []).slice(0, 4).map((c) => {
    const txt = c.text.replace(/\s+/g, " ").trim();
    return {
      quote: txt.length > 80 ? txt.slice(0, 78) + "…" : txt,
      channel: c.channel,
      likes: c.like_count,
    };
  });

  return {
    ...mockCard,
    trail,
    diffusion,
    diffusionPeak: { hour: peakIdx.hour },
    reception,
    kg: null, // GRAPH은 weekly only (PRD lock + 5-gram false positive risk)
    _isReal: true,
  };
}

// Spectrum mark — refined SVG with refraction
function SpectrumMark({ size = 28, strokeWidth = 1.4, animated = false }) {
  const colors = [
    "var(--spec-canonical)",
    "var(--spec-direct)",
    "var(--spec-partial)",
    "var(--spec-transformed)",
    "var(--spec-unverifiable)",
  ];
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" style={{ display: "block" }}>
      {/* Incident light beam */}
      <line x1="2" y1="13" x2="11" y2="13" stroke="var(--ink)" strokeWidth={strokeWidth * 0.65} opacity="0.35" />
      {/* Prism */}
      <polygon
        points="16,4 28,26 4,26"
        fill="none"
        stroke="var(--ink)"
        strokeWidth={strokeWidth}
      />
      {/* Dispersion rays */}
      {colors.map((c, i) => {
        const offset = (i - 2) * 1.6;
        return (
          <line
            key={i}
            x1={16 + offset * 0.4}
            y1={16}
            x2={28 + offset * 1.0}
            y2={20 + i * 0.4}
            stroke={c}
            strokeWidth={strokeWidth * 1.05}
            opacity="0.92"
            className={animated ? "shimmer" : ""}
            style={{ animationDelay: `${i * 0.2}s` }}
          />
        );
      })}
    </svg>
  );
}

function formatNumber(n) {
  if (n == null) return "—";
  if (n === 0) return "0";
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, "") + "만";
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return n.toLocaleString();
}

function formatNumberCompact(n) {
  if (n == null) return "—";
  if (n >= 10000) return (n / 10000).toFixed(n >= 100000 ? 0 : 1).replace(/\.0$/, "") + "만";
  if (n >= 1000) return (n / 1000).toFixed(0) + "K";
  return n.toString();
}

// ============================================================
// DIFFUSION CURVE — refined with axis ticks + peak annotation
// ============================================================

function DiffusionCurve({ data, peak }) {
  const W = 320, H = 150;
  const pad = { top: 18, right: 16, bottom: 28, left: 42 };
  const iw = W - pad.left - pad.right;
  const ih = H - pad.top - pad.bottom;
  const maxRaw = Math.max(...data.map(d => d.cumulative));
  const niceMax = (() => {
    if (maxRaw < 50000) return Math.ceil(maxRaw / 10000) * 10000;
    if (maxRaw < 200000) return Math.ceil(maxRaw / 50000) * 50000;
    return Math.ceil(maxRaw / 100000) * 100000;
  })();
  const points = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1)) * iw,
    y: pad.top + ih - (d.cumulative / niceMax) * ih,
    hour: d.hour,
    val: d.cumulative,
  }));
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  const areaPath = `${path} L ${points[points.length - 1].x} ${pad.top + ih} L ${points[0].x} ${pad.top + ih} Z`;
  const yTicks = [0, 0.5, 1];
  const formatHour = (h) => h < 24 ? `${h}h` : `${Math.round(h / 24)}d`;
  const peakIdx = peak ? data.findIndex(d => d.hour === peak.hour) : -1;
  return (
    <div>
      <div className="section-label mb-3">FIG.B — 확산 곡선</div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: 200 }}>
        <defs>
          <linearGradient id="diffusionGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stopColor="var(--spec-canonical)" stopOpacity="0.22" />
            <stop offset="100%" stopColor="var(--spec-canonical)" stopOpacity="0.01" />
          </linearGradient>
        </defs>
        {/* Y-axis grid */}
        {yTicks.map((frac, i) => {
          const y = pad.top + ih - frac * ih;
          const v = frac * niceMax;
          return (
            <g key={i}>
              <line x1={pad.left} y1={y} x2={pad.left + iw} y2={y} stroke="var(--rule)" strokeDasharray="2 4" opacity={frac === 0 ? 1 : 0.6} />
              <text x={pad.left - 6} y={y + 3} textAnchor="end" fontSize="8.5" fill="var(--ink-faint)" className="mono">{formatNumberCompact(v)}</text>
            </g>
          );
        })}
        {/* X axis baseline */}
        <line x1={pad.left} y1={pad.top + ih} x2={pad.left + iw} y2={pad.top + ih} stroke="var(--rule)" strokeWidth="0.8" />

        {/* Area */}
        <path d={areaPath} fill="url(#diffusionGrad)" />
        {/* Line */}
        <path d={path} fill="none" stroke="var(--spec-canonical)" strokeWidth="1.6" />
        {/* Peak annotation marker */}
        {peakIdx >= 0 && (
          <g>
            <circle cx={points[peakIdx].x} cy={points[peakIdx].y} r="6" fill="none" stroke="var(--spec-transformed)" strokeWidth="1.2" />
            <line
              x1={points[peakIdx].x}
              y1={points[peakIdx].y - 8}
              x2={points[peakIdx].x}
              y2={pad.top - 4}
              stroke="var(--spec-transformed)"
              strokeWidth="0.8"
              strokeDasharray="2 2"
            />
            <text x={points[peakIdx].x} y={pad.top - 6} textAnchor="middle" fontSize="8" fill="var(--spec-transformed)" className="mono" letterSpacing="0.1em">PEAK</text>
          </g>
        )}
        {/* Data points */}
        {points.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="2.5" fill="white" stroke="var(--spec-canonical)" strokeWidth="1.4" />
            <text x={p.x} y={H - 8} textAnchor="middle" fontSize="8.5" fill="var(--ink-mid)" className="mono">{formatHour(p.hour)}</text>
          </g>
        ))}
      </svg>
      {peak && (
        <div className="text-[11px] text-[color:var(--ink-soft)] leading-relaxed mt-2 italic serif">
          {peak.label}
        </div>
      )}
    </div>
  );
}

// ============================================================
// HORIZONTAL SNAP — native scroll-snap carousel for inner-inner cards
// Used inside Spread panels (FLOW / REACT / TRACE) so each step or
// comment becomes its own full-width mini-card with horizontal swipe.
// ============================================================

function HorizontalSnap({ items, render }) {
  const [active, setActive] = useState(0);
  const ref = useRef(null);
  // Card width per item — keeps a slim peek of the next card visible
  // so the user can SEE there's more content sideways.
  const ITEM_WIDTH_PCT = 78;
  const STEP_PX_RATIO  = ITEM_WIDTH_PCT / 100;

  const go = (dir) => {
    const el = ref.current;
    if (!el) return;
    el.scrollBy({ left: dir * el.clientWidth * STEP_PX_RATIO, behavior: "smooth" });
  };

  const onScroll = () => {
    const el = ref.current;
    if (!el) return;
    const step = el.clientWidth * STEP_PX_RATIO;
    const idx = Math.round(el.scrollLeft / step);
    setActive(Math.max(0, Math.min(items.length - 1, idx)));
  };

  return (
    <div>
      <div
        ref={ref}
        onScroll={onScroll}
        className="snap-scroller flex overflow-x-auto items-stretch -mx-1"
        onTouchStart={(e) => e.stopPropagation()}
        onTouchMove={(e) => e.stopPropagation()}
        onTouchEnd={(e) => e.stopPropagation()}
        style={{ scrollPaddingLeft: 4, scrollPaddingRight: 4 }}
      >
        {items.map((it, i) => (
          <div
            key={i}
            className="snap-item shrink-0 px-1"
            style={{
              width: `${ITEM_WIDTH_PCT}%`,
              scrollSnapAlign: "start",
            }}
          >
            {render(it, i, items.length)}
          </div>
        ))}
      </div>

      {/* Arrows + indicator + position */}
      <div className="flex items-center justify-between mt-4 px-1">
        <button
          onClick={() => go(-1)}
          disabled={active === 0}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-white flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="이전"
        >
          <span className="serif text-[14px] leading-none">←</span>
        </button>
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-1">
            {items.map((_, i) => (
              <span
                key={i}
                className="transition-all"
                style={{
                  width: i === active ? 18 : 4,
                  height: 4,
                  background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                  opacity: i === active ? 1 : 0.4,
                }}
              />
            ))}
          </div>
          <span className="mono text-[10px] uppercase tracking-[0.18em] tabular-nums text-[color:var(--ink-mid)]">
            <span className="text-[color:var(--ink)] font-semibold">{String(active + 1).padStart(2, "0")}</span>
            <span className="text-[color:var(--ink-faint)] mx-1">/</span>
            <span>{String(items.length).padStart(2, "0")}</span>
          </span>
        </div>
        <button
          onClick={() => go(1)}
          disabled={active === items.length - 1}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-white flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="다음"
        >
          <span className="serif text-[14px] leading-none">→</span>
        </button>
      </div>
    </div>
  );
}

      <h4 className={`serif font-semibold text-[15px] leading-snug ink-${step.spec} mb-0.5`} style={{ letterSpacing: "-0.014em" }}>
        {step.actor}
      </h4>
      <div className="text-[11.5px] text-[color:var(--ink-soft)] mb-2 leading-snug">{step.outlet}</div>

      {step.note && (
        <div className="serif italic text-[11.5px] text-[color:var(--ink-soft)] leading-relaxed mb-3" style={{ letterSpacing: "-0.005em" }}>
          {"“"}{step.note}{"”"}

        )}
      </div>
    </article>
  );
}

// ============================================================
// CARD SPREAD — sub-carousel within a card (5 figures)
// All figures equal-status, navigate left/right within one box
// ============================================================

function CardSpread({ card }) {
  const [active, setActive] = useState(0);
  const [drag, setDrag] = useState({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  const [vh, setVh] = useState(0);
  const panelRefs = useRef({});
  const { trend: realTrend } = useRealData();

  // Real data swap: REAL_TREND_CARD_ID 카드는 sample 8 video × full schema로 override
  const effectiveCard = useMemo(() => {
    if (card.id === REAL_TREND_CARD_ID && realTrend) {
      return realTrendToCard(realTrend, card);
    }
    return card;
  }, [card, realTrend]);
  card = effectiveCard;

  const panels = useMemo(() => {
    const arr = [
      {
        id: "flow", label: "흐름", en: "FLOW",
        count: card.trail.length, unit: "STEPS",
        node: (
          <HorizontalSnap
            items={card.trail}
            render={(s, i, t) => <FlowMiniCard step={s} index={i} total={t} />}
          />
        )
      },
    ];
    if (card.diffusion && card.diffusion.length > 0) {
      arr.push({
        id: "spread", label: "확산", en: "SPREAD",
        count: null, unit: "CURVE",
        node: <DiffusionCurve data={card.diffusion} peak={card.diffusionPeak} />,
      });
    }
    arr.push({
      id: "trace", label: "출처", en: "TRACE",
      count: card.trail.length, unit: "LEVELS",
      node: (
        <HorizontalSnap
          items={card.trail}
          render={(s, i, t) => <TraceMiniCard step={s} index={i} total={t} />}
        />
      )
    });
    if (card.reception && card.reception.length > 0) {
      arr.push({
        id: "react", label: "반응", en: "REACT",
        count: card.reception.length, unit: "QUOTES",
        node: (
          <HorizontalSnap
            items={card.reception}
            render={(r, i, t) => <ReactMiniCard r={r} index={i} total={t} />}
          />
        )
      });
    }
    if (card.kg) arr.push({
      id: "graph", label: "관계", en: "GRAPH",
      count: card.kg.nodes.length, unit: "NODES",
      node: <MiniKG kg={card.kg} />,
    });
    return arr.map((p, i) => ({ ...p, num: String(i + 1).padStart(2, "0") }));
  }, [effectiveCard]);

  // Active panel height tracking
  useEffect(() => {
    const measure = () => {
      const el = panelRefs.current[active];
      if (el) setVh(el.offsetHeight);
    };
    measure();
    let ro;
    if (typeof ResizeObserver !== "undefined") {
      ro = new ResizeObserver(measure);
      Object.values(panelRefs.current).forEach((el) => el && ro.observe(el));
    }
    window.addEventListener("resize", measure);
    const t = setTimeout(measure, 80);
    return () => {
      window.removeEventListener("resize", measure);
      if (ro) ro.disconnect();
      clearTimeout(t);
    };
  }, [active]);

  const go = (dir) => setActive((a) => Math.max(0, Math.min(panels.length - 1, a + dir)));

  // Inner touch handlers — stopPropagation so outer card deck doesn't also receive them
  const onTouchStart = (e) => {
    e.stopPropagation();
    const t = e.touches[0];
    setDrag({ active: true, startX: t.clientX, startY: t.clientY, dx: 0, dy: 0, locked: null });
  };
  const onTouchMove = (e) => {
    if (!drag.active) return;
    e.stopPropagation();
    const t = e.touches[0];
    const dx = t.clientX - drag.startX;
    const dy = t.clientY - drag.startY;
    let locked = drag.locked;
    if (!locked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
    }
    setDrag((d) => ({ ...d, dx, dy, locked }));
  };
  const onTouchEnd = (e) => {
    if (!drag.active) return;
    e.stopPropagation();
    if (drag.locked === "x") {
      const threshold = 50;
      if (drag.dx > threshold) go(-1);
      else if (drag.dx < -threshold) go(1);
    }
    setDrag({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  };
  const dragOffset = drag.locked === "x" ? drag.dx : 0;

  return (
    <div className="my-6">
      {/* Spread tabs — each tab shows the spread's content count
          (e.g. FLOW · 07 STEPS) so the user knows what's nearby */}
      <div className="flex items-stretch gap-0 overflow-x-auto pb-0 mb-3 border-b hairline" style={{ scrollbarWidth: "none" }}>
        {panels.map((p, i) => {
          const isActive = i === active;
          return (
            <button
              key={p.id}
              onClick={() => setActive(i)}
              className="shrink-0 px-3.5 py-2.5 text-left transition-all relative group"
              style={{
                borderBottom: "2px solid",
                borderBottomColor: isActive ? "var(--spec-canonical)" : "transparent",
                marginBottom: -1,
                background: isActive ? "var(--paper-2)" : "transparent",
              }}
            >
              <div className="flex items-baseline gap-1.5 mb-0.5">
                <span
                  className="mono text-[9.5px] tracking-[0.18em] uppercase font-semibold"
                  style={{ color: isActive ? "var(--spec-canonical)" : "var(--ink-faint)" }}
                >
                  {p.num}
                </span>
                <span className="mono text-[9px] tracking-[0.18em] uppercase text-[color:var(--ink-faint)]">
                  {p.en}
                </span>
              </div>
              <div className="flex items-baseline gap-2">
                <span
                  className="serif text-[14px] font-semibold leading-tight"
                  style={{
                    letterSpacing: "-0.012em",
                    color: isActive ? "var(--spec-canonical)" : "var(--ink-mid)",
                  }}
                >
                  {p.label}
                </span>
                {p.count != null && (
                  <span
                    className="mono text-[10px] font-semibold tabular-nums tracking-[0.04em]"
                    style={{ color: isActive ? "var(--ink)" : "var(--ink-mid)" }}
                  >
                    {String(p.count).padStart(2, "0")}
                  </span>
                )}
                {p.count == null && p.unit && (
                  <span
                    className="mono text-[9px] tracking-[0.18em] uppercase font-medium"
                    style={{ color: isActive ? "var(--ink-mid)" : "var(--ink-faint)" }}
                  >
                    {p.unit}
                  </span>
                )}
              </div>
            </button>
          );
        })}
      </div>

      {/* Spread viewport — single box, swipe horizontally */}
      <div
        className="overflow-hidden"
        style={{
          background: "var(--paper-2)",
          border: "1px solid var(--rule)",
          borderRadius: 2,
          height: vh ? `${vh + 40}px` : "auto",
          transition: "height 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          touchAction: "pan-y",
          boxShadow: "inset 0 1px 0 rgba(255,255,255,0.6), inset 0 -1px 0 rgba(24,24,27,0.04)",
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div
          className="flex items-start"
          style={{
            transform: `translateX(calc(${-active * 100}% + ${dragOffset}px))`,
            transition: drag.active && drag.locked === "x"
              ? "none"
              : "transform 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          }}
        >
          {panels.map((p, i) => (
            <div
              key={p.id}
              ref={(el) => { panelRefs.current[i] = el; }}
              className="shrink-0 w-full p-5"
            >
              {p.node}
            </div>
          ))}
        </div>
      </div>

      {/* Indicator + arrows */}
      <div className="flex items-center justify-between gap-3 mt-3.5 px-1">
        <button
          onClick={() => go(-1)}
          disabled={active === 0}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="이전 spread"
        >
          <span className="serif text-[14px] leading-none">←</span>
        </button>
        <div className="flex items-center gap-1.5">
          {panels.map((p, i) => (
            <button
              key={p.id}
              onClick={() => setActive(i)}
              className="transition-all"
              style={{
                width: i === active ? 22 : 5,
                height: 4,
                background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                opacity: i === active ? 1 : 0.4,
                borderRadius: 0,
              }}
              aria-label={`spread ${i + 1}`}
            />
          ))}
        </div>
        <button
          onClick={() => go(1)}
          disabled={active === panels.length - 1}
          className="w-7 h-7 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
          style={{ background: "white", borderRadius: 1 }}
          aria-label="다음 spread"
        >
          <span className="serif text-[14px] leading-none">→</span>
        </button>
      </div>

      {/* Position label */}
      <div className="text-center mono text-[10px] uppercase tracking-[0.18em] text-[color:var(--ink-mid)] mt-2.5 tabular-nums">
        SPREAD <span className="text-[color:var(--ink)] font-semibold">{panels[active].num}</span> / {String(panels.length).padStart(2, "0")} <span className="text-[color:var(--rule-strong)] mx-1.5">·</span> {panels[active].en}
      </div>
    </div>
  );
}

// v4 final: ProvenanceGraph — YouTube 썸네일 network (origin → 매체 → reception)

      }
    : {
        id: "origin",

        sub: "정당 회의 (시스템 외)",

  // YouTube 썸네일 카드 nodes (실제 video ID + thumbnail URL).
  // videoId가 있으면 실제 YT 썸네일 + watch link, 없으면 CSS gradient + search fallback.

  const ytWatch = (id) => `https://www.youtube.com/watch?v=${id}`;
  const ytSearch = (q) => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;

  const nodes = [
    {
      id: "yh", x: 150, y: 110, w: 170, h: 130,
      title: "경기도지사 대진표 확정…민주 추미애 vs 국힘 양향자",
      channel: "연합뉴스TV [뉴스쏙]",

      spec: "direct", lane: "yt",
      thumbColor: "linear-gradient(135deg, #88A77C 0%, #4A6B3F 50%, #2F4626 100%)",
      videoId: "6fhctwe2IzU",
      thumbnailUrl: ytThumb("6fhctwe2IzU"),
      youtubeUrl: ytWatch("6fhctwe2IzU"),
    },
    {
      id: "mbc", x: 570, y: 110, w: 170, h: 130,
      title: "양향자-추미애 '첫 여성 경기지사' 맞대결‥16곳 대진표 완성",
      channel: "MBC 뉴스데스크",
      time: "5/2 20:18", view: "28K", viewNum: 28805,
      spec: "direct", lane: "yt",
      thumbColor: "linear-gradient(135deg, #A8C39B 0%, #5B7E4F 50%, #2F4626 100%)",
      featured: true,
      videoId: "MQhr8gX8Hxg",
      thumbnailUrl: ytThumb("MQhr8gX8Hxg"),
      youtubeUrl: ytWatch("MQhr8gX8Hxg"),
    },
    {
      id: "bm", x: 595, y: 280, w: 170, h: 130,
      title: "경기지사 빅매치! 양향자 vs 추미애 격돌!",
      channel: "정치 채널 빅매치",
      time: "5/2 22:50", view: "25K", viewNum: 25000,
      spec: "partial", lane: "yt",
      thumbColor: "linear-gradient(135deg, #E5A767 0%, #C68A47 50%, #8A5E27 100%)",
      videoId: null,
      thumbnailUrl: null,
      youtubeUrl: ytSearch("경기지사 빅매치 양향자 추미애 격돌"),
    },
    {
      id: "kbs", x: 150, y: 395, w: 170, h: 130,
      title: "野 경기지사 후보 양향자 확정…추미애와 첫 여성 광역단체장 대결",
      channel: "KBS 뉴스7",
      time: "5/2 19:18", view: "2.9K", viewNum: 2938,
      spec: "direct", lane: "yt",
      thumbColor: "linear-gradient(135deg, #88A77C 0%, #4A6B3F 50%, #2F4626 100%)",
      videoId: "OEBVgFIgsYc",
      thumbnailUrl: ytThumb("OEBVgFIgsYc"),

    },

      time: "5/3 10:00", view: "13K", viewNum: 13200,

      thumbnailUrl: ytThumb("oF3oiOVkK5k"),
      youtubeUrl: ytWatch("oF3oiOVkK5k"),
    },
  ];

  // Real data swap: 5 unique channel을 view_count desc 순으로 5개 슬롯에 mapping.
  // 시각 layout (위치/그라디언트)은 보존하고 데이터 필드만 swap.
  if (realTrend && realTrend.videos && realTrend.videos.length >= 5) {
    const fmtTime = (iso) => {
      const d = new Date(iso);
      return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;

    const fmtView = (n) => (n >= 1000 ? `${(n / 1000).toFixed(n >= 10000 ? 0 : 1)}K` : String(n));

    const byChannel = {};
    for (const v of realTrend.videos) {
      const cid = v.channel.id;
      if (!byChannel[cid] || v.view_count > byChannel[cid].view_count) byChannel[cid] = v;

    const reps = Object.values(byChannel).sort((a, b) => b.view_count - a.view_count).slice(0, 5);

    nodes.forEach((node, i) => {
      const v = reps[slotOrder[i]];
      if (!v) return;
      node.title = v.title;
      node.channel = v.channel.title;
      node.time = fmtTime(v.published_at);
      node.view = fmtView(v.view_count);
      node.viewNum = v.view_count;
      node.spec = tierToSpec(v.channel.authority_tier);
      node.videoId = v.video_id;
      node.thumbnailUrl = ytThumb(v.video_id);
      node.youtubeUrl = ytWatch(v.video_id);
      node._tier = v.channel.authority_tier;
    });
  }

  const allNodes = [origin, ...nodes];
  const nodeMap = Object.fromEntries(allNodes.map((n) => [n.id, n]));

  // edges
  const edges = [
    { from: "origin", to: "yh",     type: "originates", weight: 2.0, curve: 0 },
    { from: "origin", to: "mbc",    type: "originates", weight: 3.5, curve: 0 },
    { from: "origin", to: "bm",     type: "originates", weight: 3.0, curve: 0 },
    { from: "origin", to: "kbs",    type: "originates", weight: 1.6, curve: 0 },
    { from: "origin", to: "shorts", type: "originates", weight: 2.4, curve: 0 },  // shorts now direct from origin (simpler narrative)
  ];

  const curvedPath = (x1, y1, x2, y2, curve = 0.15) => {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len;
    const ny = dx / len;
    const cx = mx + nx * len * curve;
    const cy = my + ny * len * curve;
    return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
  };

  const isHighlighted = (id) =>
    !hoveredId || hoveredId === id ||
    edges.some((e) => (e.from === hoveredId && e.to === id) || (e.to === hoveredId && e.from === id));

  // Edge weight derived from target outlet viewNum (Jack 5/12 — semantic binding)
  const edgeWeight = (e) => {
    const t = nodeMap[e.to];
    const f = nodeMap[e.from];
    const ref = t.viewNum || f.viewNum || 5000;
    // sqrt scale — MBC 28K ≈ 8.2 / KBS 2.9K ≈ 5.2 (more visible spread, no thin lines)
    return Math.max(3.5, Math.sqrt(ref / 1000) * 1.2 + 2.5);
  };

  // Click handler — YouTube 영상은 새 탭으로 watch URL 또는 search URL로 이동.
  // Origin은 today page로 navigate. 후속에는 origin도 별도 detail page 가능.
  const handleNodeClick = (n) => {
    if (n.youtubeUrl) {
      window.open(n.youtubeUrl, "_blank", "noopener,noreferrer");
    } else if (setPage) {
      setPage("today");
    }
  };

  return (
    <div className="provenance-graph-wrap my-3">
      {/* Header — 분광 정체성 + mini legend strip (replaces floating legend) */}
      <div className="flex items-center gap-3 mb-3 text-[10px] text-[color:var(--ink-mid)] flex-wrap" style={{ fontFamily: "Pretendard, sans-serif" }}>
        <span className="font-bold text-[color:var(--ink)]" style={{ letterSpacing: "0.12em", textTransform: "uppercase", fontSize: "10.5px" }}>ORIGIN</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: "10px", fontSize: "10px" }}>
          {[
            { spec: "canonical", label: "1차" },
            { spec: "direct", label: "직접" },
            { spec: "partial", label: "부분" },
            { spec: "transformed", label: "2차 가공" },
          ].map((x) => (
            <span key={x.spec} style={{ display: "inline-flex", alignItems: "center", gap: "4px" }}>
              <span style={{ width: 9, height: 9, borderRadius: 2, background: `var(--spec-${x.spec})` }}></span>
              <span>{x.label}</span>
            </span>
          ))}
        </span>
        <span className="flex-1 border-t hairline"></span>
        <span style={{ fontSize: "9.5px" }}>굵기 ∝ 조회수 · ● = 흐름</span>
      </div>

      {/* Mixed layer: SVG edges (behind) + HTML thumbnail cards (above) */}
      <div style={{ position: "relative", width: "100%", aspectRatio: "720 / 540" }}>

        {/* SVG edges */}
        <svg
          viewBox="0 0 720 540"
          preserveAspectRatio="none"
          xmlns="http://www.w3.org/2000/svg"
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none" }}
        >
          <defs>
            <linearGradient id="g-reception-h" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="rgba(232, 130, 93, 0.16)" />
              <stop offset="50%" stopColor="rgba(178, 111, 140, 0.16)" />
              <stop offset="100%" stopColor="rgba(107, 122, 161, 0.16)" />
            </linearGradient>
            {/* Halo blur filter — gives edges 3D dispersion depth */}
            <filter id="edge-halo-blur" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" />
            </filter>
            {/* Spectral beam gradients per edge — origin (canonical indigo) → outlet (target spec color)
                This is the actual prism dispersion: white origin light splits into spec color rays */}
            {edges.map((e, i) => {
              const f = nodeMap[e.from];
              const t = nodeMap[e.to];
              const targetSpec = t.spec || "canonical";  // target outlet's spec
              return (
                <linearGradient key={`beam-${i}`} id={`beam-${e.from}-${e.to}`}
                  x1={f.x} y1={f.y} x2={t.x} y2={t.y}
                  gradientUnits="userSpaceOnUse">
                  <stop offset="0%"   stopColor="var(--spec-canonical)" stopOpacity="0.45" />
                  <stop offset="50%"  stopColor={`var(--spec-${targetSpec})`} stopOpacity="0.85" />
                  <stop offset="100%" stopColor={`var(--spec-${targetSpec})`} stopOpacity="0.98" />
                </linearGradient>
              );
            })}
          </defs>

          {/* Reception band */}
          <rect x="40" y="490" width="640" height="40" rx="14" fill="url(#g-reception-h)" stroke="var(--rule)" strokeWidth="1" strokeDasharray="3 3" />
          <text x="56" y="508" fontFamily="Pretendard" fontSize="10.5" fontWeight="700" fill="var(--ink-soft)" letterSpacing="0.06em">
            댓글 cluster (33개 수집)
          </text>
          <text x="56" y="522" fontFamily="Pretendard" fontSize="10.5" fontWeight="500" fill="var(--ink-soft)">
            양향자 비판 · 추미애 비판 · 제3당 호소 (조응천)
          </text>

          {/* (Edges moved to HTML div ribbons below SVG for true CSS 3D perspective) */}
          {/* (Light packets removed — dispersion ribbon already conveys flow + color 진하기 = view) */}
          {/* (Annotation badges removed — info consolidated into header mini-legend + outlet card spec labels) */}
          <g style={{ display: "none" }}>
            {edges.map((e, i) => null)}
          </g>
        </svg>

        {/* HTML 3D CONE RIBBON edges — clip-path trapezoid, narrow at origin → wide at outlet (view 비례) */}
        <div style={{
          position: "absolute", inset: 0, pointerEvents: "none",
          perspective: "1400px", transformStyle: "preserve-3d",
          zIndex: 1,
        }}>
          {edges.map((e, i) => {
            const f = nodeMap[e.from];
            const t = nodeMap[e.to];
            const target = nodeMap[e.to];
            const dx = t.x - f.x, dy = t.y - f.y;
            const len = Math.sqrt(dx*dx + dy*dy);
            const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;
            // Ribbon starts AT origin position (left edge), extends to outlet
            const startX = f.x / 720 * 100;
            const startY = f.y / 540 * 100;
            const widthPct = len / 720 * 100;
            const viewNum = target.viewNum || 5000;
            const intensity = Math.min(1, Math.log10(viewNum / 500) * 0.42);  // 0.35 (KBS) ~ 1.0 (MBC)
            // Power-scale opacity for stronger viral contrast — KBS dim (~0.50), MBC bright (~1.0)
            const opacity = Math.min(1, 0.30 + Math.pow(intensity, 1.4) * 0.85);
            // Clip-path: narrow at origin (16% height) → wide at outlet (view-proportional 54%~100%)
            const wideEnd = 20 + intensity * 80;  // 20% (KBS thin) to 100% (MBC wide) — dramatic contrast
            const narrowStart = 8;  // origin side: 50-8 ~ 50+8 (16% thick)
            const clipPath = `polygon(0% ${50 - narrowStart}%, 100% ${50 - wideEnd/2}%, 100% ${50 + wideEnd/2}%, 0% ${50 + narrowStart}%)`;
            const originColor = "var(--spec-canonical)";
            const outletColor = `var(--spec-${target.spec})`;
            const highlighted = !hoveredId || e.from === hoveredId || e.to === hoveredId;
            return (
              <div
                key={`ribbon-${i}`}
                style={{
                  position: "absolute",
                  left: `${startX}%`, top: `${startY}%`,
                  width: `${widthPct}%`,
                  height: "44px",
                  transform: `translateY(-50%) rotate(${angleDeg}deg) perspective(900px) rotateX(40deg)`,
                  transformOrigin: "left center",
                  transformStyle: "preserve-3d",
                  opacity: highlighted ? opacity : 0.20,
                  transition: "opacity 0.25s",
                  clipPath,
                  WebkitClipPath: clipPath,
                  filter: `drop-shadow(0 0 ${4 + intensity * 18}px color-mix(in srgb, ${outletColor} ${10 + intensity * 30}%, transparent))`,
                }}
              >
                <div style={{
                  width: "100%", height: "100%",
                  background: `linear-gradient(135deg,
                    color-mix(in srgb, ${outletColor} ${5 + intensity * 25}%, rgba(255,255,255,${0.45 + intensity * 0.42})) 0%,
                    color-mix(in srgb, ${outletColor} ${3 + intensity * 20}%, rgba(228,228,238,${0.25 + intensity * 0.35})) 50%,
                    color-mix(in srgb, ${outletColor} ${2 + intensity * 14}%, rgba(195,195,212,${0.18 + intensity * 0.28})) 100%
                  )`,
                  backdropFilter: "blur(3px) saturate(115%)",
                  WebkitBackdropFilter: "blur(3px) saturate(115%)",
                  boxShadow: `
                    inset 0 2.5px 0 rgba(255,255,255,${0.55 + intensity * 0.30}),
                    inset 0 -2px 0 rgba(20,20,40,0.20),
                    inset 2px 0 0 rgba(255,255,255,${0.22 + intensity * 0.20}),
                    0 5px 13px rgba(40,30,80,0.14),
                    0 12px 24px rgba(40,30,80,0.08)
                  `,
                }} />
              </div>
            );
          })}
        </div>

        {/* Origin card — special star design */}
        <button
          onClick={() => handleNodeClick(origin)}
          onMouseEnter={() => setHoveredId("origin")}
          onMouseLeave={() => setHoveredId(null)}
          style={{
            position: "absolute",
            left: `${(origin.x - origin.w / 2) / 720 * 100}%`,
            top: `${(origin.y - origin.h / 2) / 540 * 100}%`,
            width: `${origin.w / 720 * 100}%`,
            height: `${origin.h / 540 * 100}%`,
            background: "linear-gradient(135deg, rgba(107, 122, 161, 0.78) 0%, rgba(74, 87, 121, 0.78) 60%, rgba(47, 58, 85, 0.78) 100%)",
            backdropFilter: "blur(8px) saturate(140%)",
            WebkitBackdropFilter: "blur(8px) saturate(140%)",
            border: "2px solid color-mix(in srgb, var(--spec-canonical) 70%, white)",
            borderRadius: "16px",
            boxShadow: "0 8px 28px rgba(74, 87, 121, 0.22), 0 2px 8px rgba(74, 87, 121, 0.10), inset 0 1px 0 rgba(255,255,255,0.45), 0 0 32px color-mix(in srgb, var(--spec-canonical) 28%, transparent)",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            color: "white",
            cursor: "pointer",
            opacity: isHighlighted("origin") ? 1.0 : 0.85,
            transform: "perspective(900px) rotateX(8deg) translateZ(-30px) scale(0.92)",
            transformStyle: "preserve-3d",
            transition: "opacity 0.3s, transform 0.3s, box-shadow 0.3s",
            padding: "12px 14px",
            textAlign: "center",
            fontFamily: "Pretendard, sans-serif",
            zIndex: 1,
          }}
          onFocus={(e) => e.currentTarget.style.outline = "none"}
        >
          <div style={{ fontSize: "13.5px", fontWeight: 800, lineHeight: 1.25, letterSpacing: "-0.01em", marginBottom: 5, whiteSpace: "nowrap" }}>
            {origin.label}
          </div>
          <div style={{ fontSize: "10.5px", fontWeight: 500, color: "rgba(255,255,255,0.82)", marginBottom: 8 }}>
            {origin.sub}
          </div>
          <div style={{
            fontFamily: "JetBrains Mono, monospace",
            fontSize: "9px",
            letterSpacing: "0.12em",
            color: "rgba(255,255,255,0.92)",
            padding: "2px 8px",
            border: "1px solid rgba(255,255,255,0.35)",
            borderRadius: "100px",
          }}>
            ORIGIN · {origin.time}
          </div>
        </button>

        {/* YouTube thumbnail cards */}
        {nodes.map((n) => {
          const opacity = isHighlighted(n.id) ? 1 : 0.55;
          return (
            <button
              key={n.id}
              onClick={() => handleNodeClick(n)}
              onMouseEnter={() => setHoveredId(n.id)}
              onMouseLeave={() => setHoveredId(null)}
              style={{
                position: "absolute",
                left: `${(n.x - n.w / 2) / 720 * 100}%`,
                top: `${(n.y - n.h / 2) / 540 * 100}%`,
                width: `${n.w / 720 * 100}%`,
                height: `${n.h / 540 * 100}%`,
                background: `color-mix(in srgb, var(--spec-${n.spec}) 13%, white)`,
                backdropFilter: "blur(10px) saturate(160%)",
                WebkitBackdropFilter: "blur(10px) saturate(160%)",
                border: `${n.featured ? 3 : 2.5}px solid var(--spec-${n.spec})`,
                borderRadius: "14px",
                transform: hoveredId === n.id
                  ? "perspective(900px) rotateY(-6deg) rotateX(4deg) translateZ(50px) scale(1.25)"
                  : "perspective(900px) rotateY(-4deg) rotateX(2.5deg)",
                zIndex: hoveredId === n.id ? 50 : 2,
                transformStyle: "preserve-3d",
                boxShadow: (() => {
                  const g = Math.min(1, (n.viewNum || 0) / 30000);
                  const offY = 6 + g * 16;
                  const blur = 18 + g * 38;
                  const alpha = 0.14 + g * 0.24;
                  const haloBlur = 18 + g * 40;
                  return `
                    inset 0 1px 0 rgba(255,255,255,0.95),
                    inset 0 -1px 0 rgba(120,120,180,0.18),
                    inset 1px 0 0 rgba(255,255,255,0.4),
                    inset -1px 0 0 rgba(0,0,0,0.06),
                    0 1px 0 rgba(255,255,255,0.6),
                    0 2px 4px rgba(80, 60, 40, 0.08),
                    0 ${offY}px ${blur}px rgba(80, 60, 160, ${alpha}),
                    0 0 ${haloBlur}px color-mix(in srgb, var(--spec-${n.spec}) 38%, transparent)
                  `;
                })(),
                cursor: "pointer",
                overflow: "hidden",
                display: "flex",
                flexDirection: "column",
                opacity,
                transition: "opacity 0.25s, transform 0.32s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.32s",
                transformStyle: "preserve-3d",
                fontFamily: "Pretendard, sans-serif",
                padding: 0,
                textAlign: "left",
                /* zIndex now set with transform above */
              }}
            >
              {/* Thumbnail area — real YT thumbnail w/ CSS gradient fallback */}
              <div style={{
                position: "relative",
                background: n.thumbColor,
                aspectRatio: "16 / 9",
                flexShrink: 0,
                width: "100%",
                overflow: "hidden",
              }}>
                {/* Real YouTube thumbnail (img) */}
                {n.thumbnailUrl && (
                  <img
                    src={n.thumbnailUrl}
                    alt={n.title}
                    loading="lazy"
                    style={{
                      width: "100%",
                      height: "100%",
                      objectFit: "cover",
                      display: "block",
                    }}
                    onError={(e) => { e.currentTarget.style.display = "none"; }}
                  />
                )}
                {/* Bottom gradient overlay for text legibility */}
                <div style={{
                  position: "absolute",
                  bottom: 0, left: 0, right: 0,
                  height: "55%",
                  background: "linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 100%)",
                  pointerEvents: "none",
                }} />
                {/* Spec color radial refraction tint — Jack 5/13 prism feel (enhanced) */}
                <div style={{
                  position: "absolute",
                  inset: 0,
                  background: `radial-gradient(ellipse at 18% 12%, color-mix(in srgb, var(--spec-${n.spec}) 58%, transparent) 0%, transparent 55%), radial-gradient(ellipse at 82% 88%, color-mix(in srgb, var(--spec-${n.spec}) 42%, transparent) 0%, transparent 60%)`,
                  mixBlendMode: "screen",
                  pointerEvents: "none",
                }} />
                {/* Second layer: dark spec hue in shadows */}
                <div style={{
                  position: "absolute",
                  inset: 0,
                  background: `linear-gradient(135deg, transparent 50%, color-mix(in srgb, var(--spec-${n.spec}) 30%, transparent) 100%)`,
                  mixBlendMode: "multiply",
                  pointerEvents: "none",
                  opacity: 0.6,
                }} />
                {/* Play button overlay */}
                <div style={{
                  position: "absolute",
                  top: "50%", left: "50%",
                  transform: "translate(-50%, -50%)",
                  width: "32px", height: "32px",
                  borderRadius: "50%",
                  background: "rgba(0,0,0,0.78)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "12px", color: "white", paddingLeft: "2px",
                  boxShadow: "0 2px 8px rgba(0,0,0,0.25)",
                }}>
                  ▶
                </div>
                {/* View count chip bottom-right */}
                <div style={{
                  position: "absolute",
                  bottom: 6, right: 6,
                  fontSize: "9.5px",
                  fontWeight: 700,
                  color: "white",
                  background: "rgba(0,0,0,0.78)",
                  padding: "2px 6px",
                  borderRadius: "4px",
                  fontFamily: "JetBrains Mono, monospace",
                  letterSpacing: "0.04em",
                }}>
                  ▶ {n.view}
                </div>
                {/* Time chip top-left */}
                <div style={{
                  position: "absolute",
                  top: 6, left: 6,
                  fontSize: "9px",
                  fontWeight: 600,
                  color: "rgba(255,255,255,0.96)",
                  background: "rgba(0,0,0,0.65)",
                  padding: "2px 6px",
                  borderRadius: "4px",
                  fontFamily: "JetBrains Mono, monospace",
                  letterSpacing: "0.04em",
                }}>
                  {n.time}
                </div>
              </div>
              {/* Body */}
              <div style={{
                padding: "10px 12px 11px",
                minHeight: 38,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                width: "100%",
                background: "rgba(255,255,255,0.92)",
              }}>
                <div style={{
                  fontSize: "12px",
                  color: `var(--spec-${n.spec})`,
                  fontWeight: 800,
                  letterSpacing: "-0.005em",
                  textAlign: "center",
                  width: "100%",
                  whiteSpace: "nowrap",
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                }}>
                  {n.channel}
                </div>
              </div>
              {/* Full-card HOVER OVERLAY — sized to fit within scaled card (170×130 × 1.25 = 212×162) */}
              {hoveredId === n.id && (
                <div style={{
                  position: "absolute",
                  inset: 0,
                  background: "linear-gradient(180deg, rgba(11,11,18,0.55) 0%, rgba(11,11,18,0.96) 60%)",
                  color: "white",
                  display: "flex",
                  flexDirection: "column",
                  justifyContent: "space-between",
                  padding: "10px 12px",
                  fontFamily: "Pretendard, sans-serif",
                  borderRadius: "11px",
                  zIndex: 4,
                  pointerEvents: "none",
                  boxSizing: "border-box",
                  overflow: "hidden",
                }}>
                  {/* Top: channel name (1 line, ellipsis) */}
                  <div style={{
                    fontSize: 11.5,
                    fontWeight: 800,
                    lineHeight: 1.2,
                    color: "white",
                    letterSpacing: "-0.005em",
                    whiteSpace: "nowrap",
                    overflow: "hidden",
                    textOverflow: "ellipsis",
                  }}>
                    {n.channel}
                  </div>
                  {/* Middle: video title (2 lines max, ellipsis) */}
                  <div style={{
                    fontSize: 9.5,
                    fontWeight: 500,
                    lineHeight: 1.35,
                    color: "rgba(255,255,255,0.92)",
                    display: "-webkit-box",
                    WebkitLineClamp: 2,
                    WebkitBoxOrient: "vertical",
                    overflow: "hidden",
                    textOverflow: "ellipsis",
                    margin: "4px 0",
                  }}>
                    {n.title}
                  </div>
                  {/* Bottom: spec chip + view (1 line) */}
                  <div style={{
                    fontSize: 9,
                    display: "flex",
                    gap: 6,
                    alignItems: "center",
                    flexWrap: "nowrap",
                  }}>
                    <span style={{
                      padding: "2px 8px",
                      borderRadius: 100,
                      background: `var(--spec-${n.spec})`,
                      color: "white",
                      fontWeight: 700,
                      fontSize: 9,
                      whiteSpace: "nowrap",
                      flexShrink: 0,
                    }}>
                      {n.spec === "direct" ? "직접 인용" : n.spec === "partial" ? "부분 인용" : n.spec === "transformed" ? "2차 가공" : "1차"}
                    </span>
                    <span style={{ fontWeight: 700, color: "white", whiteSpace: "nowrap" }}>▶ {n.view}</span>
                  </div>
                </div>
              )}
            </button>
          );
        })}
      </div>

    </div>
  );
}

        오늘은 <span style={{ background: "linear-gradient(180deg, transparent 65%, rgba(232,130,93,0.22) 65%)", padding: "0 2px" }}>양향자-추미애 경기지사 맞대결</span>이 24시간 안에 5매체로 펼쳐졌어요.

// DECK — carousel
// ============================================================

function Deck({ panels, onCorrect }) {
  const [active, setActive] = useState(0);
  const [expandedMap, setExpandedMap] = useState({});
  // Touch with axis lock — only treats horizontal drag as swipe, vertical = page scroll
  const [drag, setDrag] = useState({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  const [viewportH, setViewportH] = useState(0);
  const cardRefs = useRef({});

  const total = panels.length;

  useEffect(() => {
    const measure = () => {
      const el = cardRefs.current[active];
      if (el) setViewportH(el.offsetHeight);
    };
    measure();
    let ro;
    if (typeof ResizeObserver !== "undefined") {
      ro = new ResizeObserver(measure);
      Object.values(cardRefs.current).forEach((el) => el && ro.observe(el));
    }
    window.addEventListener("resize", measure);
    const t = setTimeout(measure, 100);
    return () => {
      window.removeEventListener("resize", measure);
      if (ro) ro.disconnect();
      clearTimeout(t);
    };
  }, [active, expandedMap]);

  const go = useCallback((dir) => {
    setActive((a) => {
      const next = a + dir;
      if (next < 0 || next >= total) return a;
      return next;
    });
  }, [total]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
      if (e.key === "ArrowLeft") go(-1);
      if (e.key === "ArrowRight") go(1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [go]);

  // Touch handlers — axis-locked
  const onTouchStart = (e) => {
    const t = e.touches[0];
    setDrag({ active: true, startX: t.clientX, startY: t.clientY, dx: 0, dy: 0, locked: null });
  };
  const onTouchMove = (e) => {
    if (!drag.active) return;
    const t = e.touches[0];
    const dx = t.clientX - drag.startX;
    const dy = t.clientY - drag.startY;
    let locked = drag.locked;
    if (!locked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      locked = Math.abs(dx) > Math.abs(dy) ? "x" : "y";
    }
    setDrag((d) => ({ ...d, dx, dy, locked }));
  };
  const onTouchEnd = () => {
    if (!drag.active) return;
    if (drag.locked === "x") {
      const threshold = 55;
      if (drag.dx > threshold) go(-1);
      else if (drag.dx < -threshold) go(1);
    }
    setDrag({ active: false, startX: 0, startY: 0, dx: 0, dy: 0, locked: null });
  };
  // No mouse drag — desktop uses arrows + ←→ keys + indicator (avoids scroll-wheel conflict)

  const toggleExpand = (id) => setExpandedMap((m) => ({ ...m, [id]: !m[id] }));

  // 3D peek params
  const PEEK_TX = 84;     // % of card width offset for adjacent — wider stage
  const PEEK_ROT = 18;    // rotateY degrees — more cinematic 3D
  const PEEK_TZ = 180;    // translateZ pull-back — deeper depth
  const PEEK_OPACITY = 0.30;
  const dragOffsetActive = drag.locked === "x" ? drag.dx : 0;

  return (
    <div className="select-none">
      {/* Editorial frame mast */}
      <div className="mx-auto" style={{ maxWidth: 620 }}>
        <div className="px-4 pt-4 pb-2 flex items-center justify-between mono text-[10px] uppercase tracking-[0.22em] text-[color:var(--ink-mid)]">
          <span>{SITE_VOL}</span>
          <span className="flex items-center gap-1.5">
            <span style={{ color: "var(--spec-canonical)" }}>◆</span>
            <span>{SITE_DATE_LONG}</span>
            <span style={{ color: "var(--spec-canonical)" }}>◆</span>
          </span>
          <span className="tabular-nums">D−{DAYS_TO_ELECTION}</span>
        </div>
      </div>

      {/* 3D viewport — perspective container with absolutely-positioned cards */}
      <div
        className="relative mx-auto"
        style={{
          maxWidth: 620,
          perspective: "2000px",
          height: viewportH ? `${viewportH + 32}px` : "auto",
          transition: "height 0.5s cubic-bezier(0.22, 0.8, 0.25, 1)",
          touchAction: "pan-y",
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        {panels.map((p, i) => {
          const diff = i - active;
          const isActive = diff === 0;
          const isAdj = Math.abs(diff) === 1;
          const isFar = Math.abs(diff) >= 2;
          // Direction-aware transforms
          const tx = `${diff * PEEK_TX}%`;
          const rotY = isActive ? 0 : Math.sign(diff) * -PEEK_ROT;
          const tz = isActive ? 0 : -PEEK_TZ;
          const dragX = isActive ? dragOffsetActive : 0;

          return (
            <div
              key={p.id}
              ref={(el) => { cardRefs.current[i] = el; }}
              className="absolute top-0"
              style={{
                left: "50%",
                width: "100%",
                maxWidth: 504,
                padding: "0 12px",
                transform: `translate3d(calc(-50% + ${tx} + ${dragX}px), 0, ${tz}px) rotateY(${rotY}deg)`,
                transformStyle: "preserve-3d",
                transformOrigin: "center center",
                opacity: isFar ? 0 : isAdj ? PEEK_OPACITY : 1,
                filter: isActive
                  ? "drop-shadow(0 18px 36px rgba(40,30,80,0.18)) drop-shadow(0 6px 14px rgba(40,30,80,0.10))"
                  : "blur(1.4px)",
                pointerEvents: isActive ? "auto" : isAdj ? "auto" : "none",
                cursor: isAdj ? "pointer" : "default",
                transition: drag.active && drag.locked === "x"
                  ? "none"
                  : "transform 0.55s cubic-bezier(0.22, 0.8, 0.25, 1), opacity 0.45s, filter 0.45s",
                zIndex: 100 - Math.abs(diff),
                visibility: isFar ? "hidden" : "visible",
              }}
              onClick={() => isAdj && setActive(i)}
            >
              {p.render(expandedMap[p.id], () => toggleExpand(p.id), onCorrect)}
            </div>
          );
        })}
      </div>

      {/* Indicator + arrows */}
      <div className="mx-auto" style={{ maxWidth: 620 }}>
        <div className="flex items-center justify-between gap-3 px-4 pt-2 pb-4">
          <button
            onClick={() => go(-1)}
            disabled={active === 0}
            className="w-10 h-10 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
            style={{ background: "white", borderRadius: 1 }}
            aria-label="이전"
          >
            <span className="serif" style={{ fontSize: 18, lineHeight: 1 }}>←</span>
          </button>
          <div className="flex items-center gap-1.5">
            {panels.map((p, i) => (
              <button
                key={p.id}
                onClick={() => setActive(i)}
                className="deck-dot"
                style={{
                  width: i === active ? 26 : 6,
                  height: 6,
                  background: i === active ? "var(--spec-canonical)" : "var(--ink-faint)",
                  opacity: i === active ? 1 : 0.4,
                  borderRadius: 0,
                }}
                aria-label={`${i + 1}번째 카드`}
              />
            ))}
          </div>
          <button
            onClick={() => go(1)}
            disabled={active === total - 1}
            className="w-10 h-10 border hairline disabled:opacity-25 hover:bg-[color:var(--paper-2)] flex items-center justify-center transition-colors"
            style={{ background: "white", borderRadius: 1 }}
            aria-label="다음"
          >
            <span className="serif" style={{ fontSize: 18, lineHeight: 1 }}>→</span>
          </button>
        </div>

        <div className="ornament-rule px-6 mb-2">
          <span style={{ color: "var(--rule-strong)" }}>◆</span>
        </div>

        <div className="text-center mono text-[10px] uppercase tracking-[0.22em] text-[color:var(--ink-mid)] pb-1">
          swipe · 좌우 화살표 · 인디케이터
        </div>
        <div className="text-center mono text-[11px] tabular-nums text-[color:var(--ink-soft)] pb-3">
          <span className="num-display text-[14px] text-[color:var(--ink)]">{String(active + 1).padStart(2, "0")}</span>
          <span className="text-[color:var(--ink-faint)] mx-1.5">/</span>
          <span className="text-[color:var(--ink-mid)] tabular-nums">{String(total).padStart(2, "0")}</span>
          <span className="mx-2 text-[color:var(--rule-strong)]">·</span>
          <span className="uppercase tracking-[0.16em]">{panels[active].title}</span>
        </div>
      </div>
    </div>
  );
}

          <>
            <header className="flex items-start justify-between mb-4 gap-3">
              <div>
                <div className="cap mb-1.5">정정 요청</div>

              <button onClick={reset} className="text-[color:var(--ink-faint)] hover:text-[color:var(--ink)] text-[20px] leading-none">✕</button>
            </header>
            <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed mb-5 pl-3 border-l-2 border-canonical">
