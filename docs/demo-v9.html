            </p>
            <div className="space-y-3">
              <button
                onClick={() => setCorrectionType("journalist")}
                className="w-full text-left p-4 border hairline rounded-sm hover:bg-[color:var(--paper-2)] transition-colors"
              >
                <div className="flex items-baseline gap-2 mb-2">
                  <span className="cap-strong">기자에게</span>
                  <span className="mono text-[10px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)]">외부 매체 / 취재 요청</span>
                </div>
                <p className="text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed serif">
                  "이 부분 더 취재해주세요" — 외부 매체·기자에게 추가 자료나 관점을 요청. PRISM은 중개합니다.

              </button>

              >

                </div>
                <p className="text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed serif">
                  "이 카드 다시 업데이트해주세요" — PRISM 큐레이터에게 카드 수정 요청. 24h 내 검토 + revision history 공개.
                </p>
              </button>
            </div>
            <div className="mt-4 pt-3 border-t hairline">
              <button onClick={reset} className="cap text-[color:var(--ink-mid)] hover:text-[color:var(--ink)]">취소</button>

            <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed mb-5 pl-3 border-l-2 border-canonical">
              {correctionType === "journalist"
                ? "외부 매체·기자에게 전달할 추가 취재 요청을 적어주세요. PRISM이 정리하여 매체에 전달합니다."

              </Field>
              <div className="flex items-center justify-between gap-2 pt-2 mono uppercase tracking-[0.16em] text-[11px]">
                <button type="button" onClick={() => setCorrectionType(null)} className="cap text-[color:var(--ink-mid)] hover:text-[color:var(--ink)]">← 채널 다시 선택</button>
                <div className="flex gap-2">

                  <button
                    type="submit"

                    style={{ background: "var(--spec-canonical)", borderRadius: 1 }}
                  >
                    제출
                  </button>
                </div>
              </div>
            </form>
          </>
        )}

        {/* Step 3: success */}
        {submitted && (
          <>
            <div className="cap-strong ink-canonical mb-2">접수되었습니다</div>
            <h3 className="serif text-[18px] font-semibold leading-tight mb-3" style={{ letterSpacing: "-0.014em" }}>
              {correctionType === "journalist"
                ? "취재 요청이 정리되어 매체에 전달됩니다"
                : "정정 요청이 큐레이터에게 전달되었습니다"}

            <p className="serif italic text-[12.5px] text-[color:var(--ink-soft)] leading-relaxed mb-5">
              {correctionType === "journalist"
                ? "PRISM은 받은 요청을 정리하여 해당 매체에 전달합니다. 응답 여부와 시점은 매체에 따라 다릅니다."

            </p>
            <button onClick={reset} className="share-btn px-3 py-2 border hairline mono uppercase tracking-[0.16em] text-[11px]" style={{ borderRadius: 1 }}>닫기</button>
          </>
        )}
      </div>
    </div>
  );
}

// 5/13 벡터 파이프라인 실데이터 기반 — 매체 3시각 + Step 7 max-disperse vector arrows
function MediaSpectrumReal({ trend, selection }) {
  const [hoveredIdx, setHoveredIdx] = useState(null);
  const isMobile = typeof window !== "undefined" && window.matchMedia("(max-width: 768px)").matches;
  const [activeIdx, setActiveIdx] = useState(null);
  const plotRef = useRef(null);

  const selectedIds = new Set(selection.selection.selected_video_ids);
  const selectedVideos = trend.videos.filter((v) => selectedIds.has(v.video_id));
  const otherVideos = trend.videos.filter((v) => !selectedIds.has(v.video_id));
  const anchorId = trend.trend.anchor_video_id;

  // Y축 (시간) scale factor — sample window가 좁을 때 시각 균형 맞춤
  const maxTime = Math.max(...trend.videos.map((v) => v.axes.axis_time_distance), 0.001);
  const timeScale = maxTime < 0.05 ? Math.round(1 / maxTime / 10) * 10 : 1;
  const tScaled = (t) => Math.min(1, t * timeScale);

  // 1줄 framing summary (60자 max) — transcript_summary 첫 문장 또는 title
  const summarize = (v) => {
    const src = v.transcript_summary || v.title;
    const firstSent = src.split(/[.。!?]/)[0].trim();
    return firstSent.length > 60 ? firstSent.slice(0, 58) + "…" : firstSent;
  };

  // Click on mobile, hover on desktop
  const showPlot = isMobile ? activeIdx !== null : hoveredIdx !== null;

  useEffect(() => {
    if (!showPlot || !plotRef.current || !window.Plotly) return;
    const Plotly = window.Plotly;
    const specColors = {
      canonical: "#1e1b4b",
      direct: "#134e4a",
      partial: "#92400e",
      transformed: "#9f1239",
      unverifiable: "#57534e",
    };
    const colorFor = (v) => specColors[tierToSpec(v.channel.authority_tier)];

    // Build per-video arrow traces: line origin→tip + marker at tip
    const buildArrowTrace = (v, isSelected) => {
      const x = v.axes.axis_authority;
      const y = tScaled(v.axes.axis_time_distance);
      const z = v.axes.axis_semantic_drift;
      const c = isSelected ? colorFor(v) : "#d6d3d1";
      return {
        type: "scatter3d",
        mode: "lines+markers",
        showlegend: false,
        x: [0, x],
        y: [0, y],
        z: [0, z],
        line: { color: c, width: isSelected ? 7 : 2 },
        marker: {
          size: [0, isSelected ? 9 : 5],
          color: c,
          opacity: isSelected ? 1.0 : 0.5,
          symbol: "circle",
          line: { width: isSelected ? 1.5 : 0.5, color: "#fff" },
        },
        hovertext: [
          "",
          `${v.channel.title} — T${v.channel.authority_tier}<br>` +
            `auth ${v.axes.axis_authority.toFixed(2)} · ` +
            `time ${v.axes.axis_time_distance.toFixed(3)} · ` +
            `drift ${v.axes.axis_semantic_drift.toFixed(3)}<br>` +
            `‖vector‖ = ${Math.sqrt(x * x + y * y + z * z).toFixed(2)}`,
        ],
        hoverinfo: "text",
      };
    };

    // Origin marker
    const originTrace = {
      type: "scatter3d",
      mode: "markers+text",
      showlegend: false,
      x: [0], y: [0], z: [0],
      text: ["origin"],
      textposition: "bottom right",
      textfont: { size: 10, color: "#a8a29e", family: "Pretendard" },
      marker: { size: 6, color: "#a8a29e", symbol: "diamond", line: { width: 1, color: "#fff" } },
      hovertext: ["좌표 원점 (권위 0 · 시간 0 · 의미 변형 0)"],
      hoverinfo: "text",
    };

    // Selected channel labels at tip (separate text trace for clarity)
    const selectedLabels = {
      type: "scatter3d",
      mode: "text",
      showlegend: false,
      x: selectedVideos.map((v) => v.axes.axis_authority),
      y: selectedVideos.map((v) => tScaled(v.axes.axis_time_distance)),
      z: selectedVideos.map((v) => v.axes.axis_semantic_drift),
      text: selectedVideos.map((v) => v.channel.title),
      textposition: "top center",
      textfont: { size: 11, color: "#18181b", family: "Pretendard" },
      hoverinfo: "skip",
    };

    const traces = [
      originTrace,
      ...otherVideos.map((v) => buildArrowTrace(v, false)),
      ...selectedVideos.map((v) => buildArrowTrace(v, true)),
      selectedLabels,
    ];

    const layout = {
      margin: { l: 0, r: 0, t: 0, b: 0 },
      scene: {
        xaxis: {
          title: { text: "권위 (X)", font: { size: 11 } },
          range: [0, 1], gridcolor: "#e7e5e4", zerolinecolor: "#a8a29e",
        },
        yaxis: {
          title: { text: `시간 거리 (Y · × ${timeScale})`, font: { size: 11 } },
          range: [0, 1], gridcolor: "#e7e5e4", zerolinecolor: "#a8a29e",
        },
        zaxis: {
          title: { text: "의미 변형 (Z)", font: { size: 11 } },
          range: [0, 1], gridcolor: "#e7e5e4", zerolinecolor: "#a8a29e",
        },
        aspectmode: "cube",
        bgcolor: "#faf9f6",
        camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } },
      },
      paper_bgcolor: "#fff",
      font: { family: "Pretendard, sans-serif", size: 11 },
    };

    Plotly.react(plotRef.current, traces, layout, { displayModeBar: false, responsive: true });
  }, [showPlot, isMobile, hoveredIdx, activeIdx]);

  const tierLabel = (t) =>
    ({ 1: "T1 · 공식", 2: "T2 · 메이저", 3: "T3 · 중견", 4: "T4 · 소형", 5: "T5 · 개인" }[t] || `T${t}`);

  // 2D mobile arrow renderer (X-Z 평면 SVG)
  const Mobile2DArrows = () => {
    if (!isMobile || !showPlot) return null;
    const W = 320, H = 200, pad = 28;
    const ox = pad, oy = H - pad;
    const arrow = (v, isSel) => {
      const x = ox + v.axes.axis_authority * (W - pad * 2);
      const y = oy - v.axes.axis_semantic_drift * (H - pad * 2);
      const c = isSel
        ? ({ canonical: "#1e1b4b", direct: "#134e4a", partial: "#92400e", transformed: "#9f1239", unverifiable: "#57534e" })[tierToSpec(v.channel.authority_tier)]
        : "#d6d3d1";
      return (
        <g key={v.video_id}>
          <line x1={ox} y1={oy} x2={x} y2={y} stroke={c} strokeWidth={isSel ? 2.5 : 1} opacity={isSel ? 1 : 0.55} />
          <circle cx={x} cy={y} r={isSel ? 5 : 3} fill={c} opacity={isSel ? 1 : 0.55} />
          {isSel && <text x={x + 6} y={y - 4} fontSize="9" fill="#18181b" className="mono">{v.channel.title.slice(0, 6)}</text>}
        </g>
      );
    };
    return (
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: 220 }}>
        <line x1={ox} y1={oy} x2={W - pad} y2={oy} stroke="#a8a29e" strokeWidth="0.8" />
        <line x1={ox} y1={oy} x2={ox} y2={pad} stroke="#a8a29e" strokeWidth="0.8" />
        <text x={W - pad} y={oy + 14} fontSize="9" textAnchor="end" fill="#78716c" className="mono">권위 →</text>
        <text x={ox - 4} y={pad - 4} fontSize="9" textAnchor="start" fill="#78716c" className="mono">의미 변형 ↑</text>
        <circle cx={ox} cy={oy} r={4} fill="#a8a29e" />
        <text x={ox + 6} y={oy + 12} fontSize="8" fill="#a8a29e" className="mono">origin</text>
        {otherVideos.map((v) => arrow(v, false))}
        {selectedVideos.map((v) => arrow(v, true))}
        <text x={W - pad} y={H - 6} fontSize="8" textAnchor="end" fill="#a8a29e" className="mono">2D 투영 (시간 axis 생략)</text>
      </svg>
    );
  };

  return (
    <div className="border hairline rounded-sm bg-[color:var(--paper-2)] p-5 my-5">
      <div className="flex items-baseline justify-between mb-2 gap-3 flex-wrap">
        <div className="section-label">매체 3시각 — 같은 사실, 다른 framing</div>
        <div className="mono text-[10px] uppercase tracking-[0.16em] text-[color:var(--ink-faint)]">
          max-disperse · score {selection.selection.pairwise_distance_sum.toFixed(3)}
        </div>
      </div>
      <p className="serif italic text-[11.5px] text-[color:var(--ink-soft)] mb-4 leading-relaxed">
        PRISM은 좌·우 라벨을 부여하지 않습니다. 5개 매체 중 의미 거리(임베딩 cosine)가 가장 멀게 흩어진 3개를 자동 선정합니다.
        {isMobile ? " 카드를 탭하면 3축 vector를 2D로 봅니다." : " 카드 위에 마우스를 올리면 origin부터 뻗는 3축 vector가 펼쳐집니다."}
      </p>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 relative">
        {selectedVideos.map((v, i) => {
          const isActive = (isMobile ? activeIdx : hoveredIdx) === i;
          return (
            <div
              key={v.video_id}
              onMouseEnter={() => !isMobile && setHoveredIdx(i)}
              onMouseLeave={() => !isMobile && setHoveredIdx(null)}
              onClick={() => isMobile && setActiveIdx(activeIdx === i ? null : i)}
              className={`bg-white border rounded-sm p-3 transition-all cursor-pointer flex flex-col ${isActive ? "border-[color:var(--ink)] shadow-md" : "hairline"}`}
              style={{
                borderLeftWidth: "3px",
                borderLeftColor: `var(--spec-${tierToSpec(v.channel.authority_tier)})`,
                minHeight: 132, maxHeight: 156, overflow: "hidden",
              }}
            >
              <div className="flex items-baseline justify-between mb-1.5">
                <div className="mono text-[10px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)]">
                  매체 {String.fromCharCode(65 + i)}
                </div>
                <div className="mono text-[9px] text-[color:var(--ink-faint)]">{tierLabel(v.channel.authority_tier)}</div>
              </div>
              <div className="serif font-semibold text-[13px] leading-snug mb-1.5" style={{ letterSpacing: "-0.012em" }}>
                {v.channel.title}
              </div>
              <p className="text-[11.5px] text-[color:var(--ink-soft)] leading-snug flex-1" style={{
                display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden",
              }}>
                {summarize(v)}
              </p>
              <div className="flex items-center gap-2 mono text-[9.5px] text-[color:var(--ink-faint)] pt-1.5 mt-1.5 border-t hairline tabular-nums">
                <span>{v.view_count.toLocaleString()}</span>
                <span className="text-[color:var(--ink-faint)]">·</span>
                <span>auth {v.axes.axis_authority.toFixed(2)}</span>
                <span className="text-[color:var(--ink-faint)]">·</span>
                <span>drift {v.axes.axis_semantic_drift.toFixed(2)}</span>
              </div>
            </div>
          );
        })}
      </div>
      {showPlot && (
        <div className="mt-4 border hairline rounded-sm bg-white p-3">
          <div className="flex items-baseline justify-between mb-2 gap-3 flex-wrap">
            <div className="mono text-[10px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)]">
              Feature vector — origin부터 뻗는 화살표
            </div>
            <div className="mono text-[9px] text-[color:var(--ink-faint)]">
              Voyage 1024-dim → 3축 [0,1] · 화살표 길이 = ‖vector‖
            </div>
          </div>
          {isMobile ? <Mobile2DArrows /> : <div ref={plotRef} style={{ width: "100%", height: 360 }} />}
          <div className="mono text-[9.5px] text-[color:var(--ink-faint)] mt-2 leading-relaxed">
            {(() => {
              const ranked = selection.all_combinations_ranked || [];
              const next = ranked.find((c) => !c.is_winner);
              const note = timeScale > 1 ? `Y축 × ${timeScale} (좁은 시간 윈도우 ${(maxTime * 168).toFixed(1)}h 시각 균형용). ` : "";
              return note + (next ? `차점 (${next.sum_pairwise_distance.toFixed(3)}): ${next.channels.join(" · ")}` : "");
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

    return cards.filter((c) =>
      (c.title + " " + c.subtitle + " " + c.body + " " + (c.issue || "")).toLowerCase().includes(q)

  }, [query, cards]);

  return (
    <div className="max-w-2xl mx-auto px-5 py-6">
      <HeroCard setPage={setPage} />

      <section className="mt-8">
        <div className="flex items-baseline justify-between mb-4">
          <h2 className="headline-display text-[20px] md:text-[22px]">오늘 따라가는 이야기</h2>

            onClick={() => setPage("today")}
            className="mono text-[10.5px] uppercase tracking-[0.18em] text-[color:var(--ink-mid)] hover:text-[color:var(--ink)]"
          >
            전체 보기 →
          </button>
        </div>

        {filtered.length === 0 ? (
          <div className="text-center py-8 serif italic text-[13px] text-[color:var(--ink-soft)]">

          <div className="space-y-3">
            {filtered.map((c) => (
              <HomeCardTeaser key={c.id} card={c} onClick={() => setPage("today")} />
            ))}
          </div>
        )}
      </section>
    </div>
  );
}

  return (

          <button
            key={iss}
            onClick={() => setActiveIssue(iss)}
            className={`px-3 py-1.5 border hairline rounded-sm text-[12px] transition-colors ${
              activeIssue === iss
                ? "bg-[color:var(--ink)] text-white border-[color:var(--ink)]"
                : "text-[color:var(--ink-soft)] hover:bg-[color:var(--paper-2)]"
            }`}
          >
            {iss === "all" ? "전체" : (ISSUE_LABELS[iss]?.label || iss)}
          </button>
        ))}
      </div>

      {Object.entries(grouped).map(([issue, group]) => (
        <section key={issue} className="mb-7">
          <div className="flex items-baseline gap-3 mb-3">
            <h2 className="headline-display text-[18px]">
              {ISSUE_LABELS[issue]?.label || issue}

            <span className="mono text-[10.5px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)] tabular-nums">

        </section>
      ))}

      {filtered.length === 0 && (
        <div className="text-center py-12 serif italic text-[13px] text-[color:var(--ink-soft)]">
          이 카테고리는 아직 따라가는 이야기가 없어요.
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [page, setPage] = useState("home");
  const [correctingCard, setCorrectingCard] = useState(null);
  const [showHowWeWork, setShowHowWeWork] = useState(false);
  const [realData, setRealData] = useState({ trend: null, selection: null, loading: true });

  useEffect(() => {
    Promise.all([
      fetch("data/06_sample_trend.json").then((r) => r.json()),
      fetch("data/07_max_disperse_selection.json").then((r) => r.json()),
    ])
      .then(([trend, selection]) => setRealData({ trend, selection, loading: false }))
      .catch((e) => {
        console.error("Real data fetch failed", e);
        setRealData({ trend: null, selection: null, loading: false });
      });
  }, []);

  const panels = useMemo(() => [
    { id: "hero", title: "Hero", render: () => <HeroCard setPage={setPage} /> },
    ...DAILY_CARDS.map((c, i) => ({
      id: c.id,
      title: `Trend ${c.trendNo}`,
      render: (expanded, toggle, onCorrect) => (
        <TrendCard card={c} onCorrect={onCorrect} />
      ),
    })),
    { id: "weekly", title: "Weekly", render: () => <WeeklyFlowCard /> },
  ], []);

  // 오늘의 이슈 (today) — 카드 5장 + Weekly만, hero 제외
  const todayPanels = useMemo(() => [
    ...DAILY_CARDS.map((c) => ({
      id: c.id,
      title: `Trend ${c.trendNo}`,
      render: (expanded, toggle, onCorrect) => (
        <TrendCard card={c} onCorrect={onCorrect} />
      ),
    })),
    { id: "weekly", title: "Weekly", render: () => <WeeklyFlowCard /> },
  ], []);

  return (
    <RealDataContext.Provider value={realData}>
      <Header page={page} setPage={setPage} />
      {page === "home" && (
        <main className="pb-6">
          <HomePage cards={DAILY_CARDS} setPage={setPage} />
        </main>
      )}
      {page === "today" && (
        <main className="pb-6">
          <Deck panels={todayPanels} onCorrect={setCorrectingCard} />
        </main>
      )}
      {page === "feed" && (
        <main className="pb-6">
          <FeedPage cards={DAILY_CARDS} onCorrect={setCorrectingCard} />
        </main>
      )}
      {showHowWeWork && (
        <div className="fixed inset-0 z-50 bg-black/45 overflow-y-auto" onClick={() => setShowHowWeWork(false)}>
          <div className="min-h-full bg-[color:var(--paper)]" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 bg-[color:var(--paper)]/96 backdrop-blur border-b" style={{ borderColor: "var(--rule)" }}>
              <div className="max-w-2xl mx-auto px-5 h-14 flex items-center justify-between">
                <span className="cap-strong">How We Work</span>
                <button onClick={() => setShowHowWeWork(false)} className="text-[color:var(--ink-faint)] hover:text-[color:var(--ink)] text-[20px] leading-none">✕</button>
              </div>
            </div>
            <HowWeWork />
          </div>
        </div>
      )}
      <Footer onHowWeWork={() => setShowHowWeWork(true)} />
      <CorrectionFormModal card={correctingCard} onClose={() => setCorrectingCard(null)} />
    </RealDataContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
